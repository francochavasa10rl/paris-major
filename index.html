<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLCS Major 2 - LCQ Tracker</title>
    <style>
        @font-face { font-family: 'Bourgeois'; src: url('fonts/Bourgeois-Bold.ttf') format('truetype'); font-weight: bold; }
        :root { --bg: #050505; --card-bg: #0f0f0f; --accent: #e24444; --text: #fff; --border: #222; }
        * { box-sizing: border-box; font-family: 'Bourgeois', sans-serif; text-transform: uppercase; }

        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { border-left: 5px solid var(--accent); margin-bottom: 20px; padding: 5px 15px; background: linear-gradient(90deg, #111 0%, transparent 100%); margin-top: 30px; }
        .lcq-container { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; margin-bottom: 30px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.9em; }
        td, th { padding: 10px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        th { color: #555; font-size: 0.75em; background: #111; }
        
        tr.top-4 td { background: rgba(226, 68, 68, 0.1); font-weight: bold; }
        tr.top-4 td:first-child { border-left: 3px solid var(--accent); }

        .groups-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .group-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
        
        .score-box input { background: #000; border: 1px solid #333; color: white; width: 35px; text-align: center; font-weight: bold; }
        .input-name { background: transparent; border: none; color: #fff; font-weight: bold; width: 100%; }
        
        .bracket-board { display: flex; gap: 20px; overflow-x: auto; padding: 20px 0; align-items: flex-start; }
        .bracket-col { display: flex; flex-direction: column; gap: 10px; min-width: 200px; }
        .b-match { background: #111; border: 1px solid #333; margin-bottom: 10px; }
        .b-team { padding: 8px; cursor: pointer; border-bottom: 1px solid #222; font-size: 0.8em; }
        .b-team.winner { background: #1e3a1e; color: #fff; }
        .b-team.loser { opacity: 0.4; }
        .prob-cell { font-size: 0.85em; }
    </style>
</head>
<body>

    <div class="header"><h1>LCQ REGION STANDINGS (SPOT EXTRA WORLDS)</h1></div>
    <div class="lcq-container">
        <table id="lcq-table">
            <thead>
                <tr>
                    <th>RANK</th>
                    <th style="text-align: left;">REGION</th>
                    <th>AVG POINTS (M1+M2)</th>
                    <th>M2 MIN SECURED</th>
                    <th>TIEBREAKER (BEST M1 + BEST M2)</th>
                </tr>
            </thead>
            <tbody id="lcq-body"></tbody>
        </table>
    </div>

    <div class="header"><h1>GROUPS & SIMULATION</h1></div>
    <div id="groups-container" class="groups-grid"></div>

    <div class="header"><h1>PLAYOFFS BRACKET</h1></div>
    <div id="bracket-container" class="bracket-board"></div>

<script>
// Puntos oficiales Major 2
const POINTS_MAP = {
    'WINNER': 36,
    'FINALIST': 24,
    'SEMIS': 16,
    'LB_QF': 12,
    'LB_R2': 8,
    'LB_R1': 6,
    'GROUPS_4TH': 4
};

// Datos fijos del Major 1
const REGION_M1_DATA = {
    'EU': { m1_pts: 72, m1_teams: 5, m1_best: 30 },
    'NA': { m1_pts: 32, m1_teams: 4, m1_best: 14 },
    'MENA': { m1_pts: 19, m1_teams: 2, m1_best: 14 },
    'SAM': { m1_pts: 8, m1_teams: 2, m1_best: 5 },
    'OCE': { m1_pts: 5, m1_teams: 1, m1_best: 5 },
    'APAC': { m1_pts: 3, m1_teams: 1, m1_best: 3 },
    'SSA': { m1_pts: 3, m1_teams: 1, m1_best: 3 }
};

const DEFAULT_GROUPS = [
    { id: 0, name: 'GROUP A', teams: [{id:0, name:'VITALITY', region:'EU', seed:1, color:'#f0e300'}, {id:1, name:'KC', region:'EU', seed:2, color:'#005299'}, {id:2, name:'WILDCARD', region:'OCE', seed:3, color:'#ff4b00'}, {id:3, name:'FUT', region:'NA', seed:4, color:'#dddddd'}], matches: [{t1:0,t2:3,s1:null,s2:null},{t1:1,t2:2,s1:null,s2:null},{t1:0,t2:2,s1:null,s2:null},{t1:1,t2:3,s1:null,s2:null},{t1:0,t2:1,s1:null,s2:null},{t1:2,t2:3,s1:null,s2:null}] },
    { id: 1, name: 'GROUP B', teams: [{id:4, name:'NRG', region:'NA', seed:1, color:'#000'}, {id:5, name:'MIBR', region:'SAM', seed:2, color:'#00f'}, {id:6, name:'CITY', region:'EU', seed:3, color:'#6ca'}, {id:7, name:'FEARS', region:'SSA', seed:4, color:'#555'}], matches: [{t1:4,t2:7,s1:null,s2:null},{t1:5,t2:6,s1:null,s2:null},{t1:4,t2:6,s1:null,s2:null},{t1:5,t2:7,s1:null,s2:null},{t1:4,t2:5,s1:null,s2:null},{t1:6,t2:7,s1:null,s2:null}] },
    { id: 2, name: 'GROUP C', teams: [{id:8, name:'TWISTED', region:'MENA', seed:1, color:'#0f0'}, {id:9, name:'NIP', region:'EU', seed:2, color:'#ff0'}, {id:10, name:'SHOPIFY', region:'NA', seed:3, color:'#0fa'}, {id:11, name:'TSM', region:'APAC', seed:4, color:'#fff'}], matches: [{t1:8,t2:11,s1:null,s2:null},{t1:9,t2:10,s1:null,s2:null},{t1:8,t2:10,s1:null,s2:null},{t1:9,t2:11,s1:null,s2:null},{t1:8,t2:9,s1:null,s2:null},{t1:10,t2:11,s1:null,s2:null}] },
    { id: 3, name: 'GROUP D', teams: [{id:12, name:'MATES', region:'EU', seed:1, color:'#f0f'}, {id:13, name:'SSG', region:'NA', seed:2, color:'#f5b'}, {id:14, name:'R8', region:'MENA', seed:3, color:'#f00'}, {id:15, name:'FURIA', region:'SAM', seed:4, color:'#000'}], matches: [{t1:12,t2:15,s1:null,s2:null},{t1:13,t2:14,s1:null,s2:null},{t1:12,t2:14,s1:null,s2:null},{t1:13,t2:15,s1:null,s2:null},{t1:12,t2:13,s1:null,s2:null},{t1:14,t2:15,s1:null,s2:null}] }
];

let data = JSON.parse(localStorage.getItem('rlcs_final_points')) || { groups: DEFAULT_GROUPS, bracket: {} };

function getSortedStandings(teams, matches) {
    return [...teams].sort((a, b) => {
        const stats = (id) => {
            let w = 0, diff = 0;
            matches.forEach(m => {
                if (m.s1 !== null && m.s2 !== null) {
                    if (m.t1 === id) { w += (m.s1 > m.s2 ? 1 : 0); diff += (m.s1 - m.s2); }
                    else if (m.t2 === id) { w += (m.s2 > m.s1 ? 1 : 0); diff += (m.s2 - m.s1); }
                }
            });
            return { w, diff };
        };
        const as = stats(a.id), bs = stats(b.id);
        if (bs.w !== as.w) return bs.w - as.w;
        if (bs.diff !== as.diff) return bs.diff - as.diff;
        return a.seed - b.seed;
    });
}

function getBracketTeams() {
    const groups = data.groups.map(g => {
        const sorted = getSortedStandings(g.teams, g.matches);
        const certainty = g.teams.map(t => ({ id: t.id, counts: [0,0,0,0] }));
        for(let i=0; i<30000; i++) {
            const simM = g.matches.map(m => (m.s1 !== null) ? m : {...m, s1: Math.random()>0.5?3:Math.floor(Math.random()*3), s2: Math.random()>0.5?3:Math.floor(Math.random()*3)});
            const res = getSortedStandings(g.teams, simM);
            for(let idx=0; idx<4; idx++) certainty.find(x => x.id === res[idx].id).counts[idx]++;
        }
        const getSecure = (pos) => (certainty.find(x => x.id === sorted[pos].id).counts[pos] === 30000) ? sorted[pos] : null;
        return { getSecure };
    });

    const m = {
        UBQF1: [groups[0].getSecure(0), groups[3].getSecure(0)],
        UBQF2: [groups[1].getSecure(0), groups[2].getSecure(0)],
        LBR1_1: [groups[2].getSecure(1), groups[3].getSecure(2)],
        LBR1_2: [groups[1].getSecure(1), groups[0].getSecure(2)],
        LBR1_3: [groups[3].getSecure(1), groups[2].getSecure(2)],
        LBR1_4: [groups[0].getSecure(1), groups[1].getSecure(2)]
    };

    const getW = (id) => data.bracket[id] ? m[id][data.bracket[id]-1] : null;
    const getL = (id) => data.bracket[id] ? m[id][data.bracket[id]===1?1:0] : null;

    m.LBR2_1 = [getW('LBR1_1'), getW('LBR1_2')];
    m.LBR2_2 = [getW('LBR1_3'), getW('LBR1_4')];
    m.LBQF1 = [getL('UBQF1'), getW('LBR2_1')];
    m.LBQF2 = [getL('UBQF2'), getW('LBR2_2')];
    m.SF1 = [getW('UBQF2'), getW('LBQF1')];
    m.SF2 = [getW('UBQF1'), getW('LBQF2')];
    m.GF = [getW('SF1'), getW('SF2')];
    return m;
}

function renderLCQ() {
    let pts = {};
    for(let i=0; i<16; i++) pts[i] = POINTS_MAP.GROUPS_4TH; // Base Top 16

    data.groups.forEach(g => {
        const sorted = getSortedStandings(g.teams, g.matches);
        const certainty = g.teams.map(t => ({ id: t.id, counts: [0,0,0,0] }));
        for(let i=0; i<2000; i++) {
            const simM = g.matches.map(m => (m.s1 !== null) ? m : { ...m, s1: Math.random()>0.5?3:0, s2: Math.random()>0.5?0:3 });
            const res = getSortedStandings(g.teams, simM);
            for(let idx=0; idx<4; idx++) certainty.find(x => x.id === res[idx].id).counts[idx]++;
        }
        g.teams.forEach(t => {
            const c = certainty.find(x => x.id === t.id);
            if (c.counts[0]+c.counts[1]+c.counts[2] === 2000) pts[t.id] = Math.max(pts[t.id], POINTS_MAP.LB_R1);
            if (c.counts[0] === 2000) pts[t.id] = Math.max(pts[t.id], POINTS_MAP.LB_QF); // UBQF garantiza Top 8
        });
    });

    const b = getBracketTeams();
    const set = (arr, p) => arr.forEach(t => { if(t) pts[t.id] = Math.max(pts[t.id], p); });
    set(b.LBR2_1, POINTS_MAP.LB_R2); set(b.LBR2_2, POINTS_MAP.LB_R2);
    set(b.SF1, POINTS_MAP.SEMIS); set(b.SF2, POINTS_MAP.SEMIS);
    set(b.GF, POINTS_MAP.FINALIST);
    if(data.bracket.GF) { const w = b.GF[data.bracket.GF-1]; if(w) pts[w.id] = POINTS_MAP.WINNER; }

    const stats = Object.keys(REGION_M1_DATA).map(r => {
        let m2_pts = 0, m2_best = 0;
        data.groups.forEach(g => g.teams.forEach(t => { if(t.region === r) { m2_pts += pts[t.id]; m2_best = Math.max(m2_best, pts[t.id]); }}));
        const m1 = REGION_M1_DATA[r];
        return { name: r, avg: (m1.m1_pts + m2_pts) / (m1.m1_teams * 2), m2_pts, tie: m1.m1_best + m2_best };
    }).sort((a,b) => b.avg - a.avg || b.tie - a.tie);

    document.getElementById('lcq-body').innerHTML = stats.map((s, i) => `<tr class="${i<4?'top-4':''}"><td>${i+1}</td><td style="text-align:left">${s.name}</td><td>${s.avg.toFixed(2)}</td><td>${s.m2_pts}</td><td>${s.tie}</td></tr>`).join('');
}

function render() {
    const container = document.getElementById('groups-container');
    container.innerHTML = '';
    data.groups.forEach(g => {
        const sorted = getSortedStandings(g.teams, g.matches);
        let html = `<div class="group-card"><h3>${g.name}</h3><table>`;
        sorted.forEach(t => {
            html += `<tr><td style="text-align:left"><input class="input-name" value="${t.name}"></td><td>${t.region}</td></tr>`;
        });
        html += `</table>`;
        g.matches.forEach((m, mi) => {
            const t1 = g.teams.find(x => x.id === m.t1), t2 = g.teams.find(x => x.id === m.t2);
            html += `<div style="display:flex; justify-content:center; gap:10px; margin-bottom:5px;">
                <span>${t1.name}</span>
                <div class="score-box">
                    <input type="number" value="${m.s1??''}" onchange="data.groups[${g.id}].matches[${mi}].s1=parseInt(this.value); save()">
                    <input type="number" value="${m.s2??''}" onchange="data.groups[${g.id}].matches[${mi}].s2=parseInt(this.value); save()">
                </div>
                <span>${t2.name}</span>
            </div>`;
        });
        container.innerHTML += html + `</div>`;
    });

    const b = getBracketTeams();
    const draw = (id, l, arr, p1, p2) => `<div class="b-match"><div style="font-size:0.6em; padding:2px; color:#555">${l}</div>` +
        arr.map((t, i) => `<div class="b-team ${t ? (data.bracket[id] === i+1 ? 'winner' : (data.bracket[id] ? 'loser' : '')) : ''}" onclick="data.bracket['${id}']=${i+1}; save()">${t ? t.name : (i===0?p1:p2)}</div>`).join('') + `</div>`;

    document.getElementById('bracket-container').innerHTML = `
        <div class="bracket-col">${draw('UBQF1','UBQF 1',b.UBQF1,'A1','D1')}${draw('UBQF2','UBQF 2',b.UBQF2,'B1','C1')}</div>
        <div class="bracket-col">${draw('LBR1_1','LBR1 1',b.LBR1_1,'C2','D3')}${draw('LBR1_2','LBR1 2',b.LBR1_2,'B2','A3')}</div>
        <div class="bracket-col">${draw('LBR2_1','LBR2 1',b.LBR2_1,'W LBR1-1','W LBR1-2')}</div>
        <div class="bracket-col">${draw('GF','GRAND FINAL',b.GF,'W SF1','W SF2')}</div>
    `;
    renderLCQ();
}

function save() { localStorage.setItem('rlcs_final_points', JSON.stringify(data)); render(); }
render();
</script>
</body>
</html>
