<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLCS PARIS MAJOR - ANALYZER</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @font-face { 
            font-family: 'Bourgeois'; 
            src: url('fonts/Bourgeois-Bold.ttf') format('truetype'); 
            font-weight: bold; 
        }
        @font-face { 
            font-family: 'Bourgeois'; 
            src: url('fonts/Bourgeois-Medium.otf') format('opentype'); 
            font-weight: 500; 
        }

        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --accent: #e24444;
            --text: #ffffff;
            --border: #222;
        }

        * { box-sizing: border-box; font-family: 'Bourgeois', sans-serif; text-transform: uppercase; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            letter-spacing: 0.2px;
        }

        .header { 
            border-left: 6px solid var(--accent); 
            margin-bottom: 40px; 
            padding: 15px 25px;
            background: linear-gradient(90deg, #111 0%, transparent 100%);
        }

        h1 { margin: 0; font-size: 2.8em; line-height: 1; }
        .subtitle { color: #666; margin-top: 5px; font-size: 0.9em; }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(580px, 1fr));
            gap: 35px;
        }

        .group-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 0;
        }

        h2 { color: var(--accent); font-size: 1.8em; margin: 0 0 20px 0; border-bottom: 1px solid #222; padding-bottom: 8px; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; table-layout: fixed; }
        th { background: #000; color: #555; font-size: 0.8em; padding: 12px 5px; text-align: center; }
        th:first-child { width: 35%; text-align: left; }
        
        td { 
            padding: 12px 5px; 
            border-bottom: 1px solid var(--border); 
            text-align: center;
            font-size: 1.1em;
        }

        .input-name { 
            background: transparent; border: none; color: white; width: 100%; 
            font-family: inherit; font-size: 1em; outline: none;
        }

        .prob-cell { font-weight: bold; font-size: 0.9em; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        /* Partidos - Ajuste de fuente más grande */
        .match-list { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .match-item {
            display: grid;
            grid-template-columns: 1fr 110px 1fr;
            align-items: center;
            background: #161616;
            padding: 18px 15px;
            border: 1px solid transparent;
        }
        .match-item:hover { border-color: #333; cursor: grab; background: #1a1a1a; }

        .team-name-match {
            font-size: 1.3em; /* Fuente más grande para equipos en partidos */
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .score-box { display: flex; align-items: center; justify-content: center; gap: 6px; }
        .score-box input {
            background: #000; border: 1px solid #333; color: white;
            text-align: center; width: 40px; height: 40px; font-size: 1.3em;
            font-weight: bold;
        }

        .goals-row { 
            grid-column: 1 / span 3; text-align: center; font-size: 0.8em; 
            color: #444; margin-top: 10px; display: flex; justify-content: center; gap: 12px;
        }
        .goals-row input { width: 32px; background: transparent; border: 1px solid #222; color: #777; text-align: center; }

        .btn-reset {
            background: transparent; color: var(--accent); border: 2px solid var(--accent);
            padding: 12px 30px; cursor: pointer; font-family: inherit; font-weight: bold;
            margin-bottom: 30px; transition: 0.2s;
        }
        .btn-reset:hover { background: var(--accent); color: white; }

    </style>
</head>
<body>

    <div class="header">
        <h1>RLCS PARIS MAJOR</h1>
        <div class="subtitle">100,000 SCENARIOS PER GROUP • 2-DECIMAL PRECISION</div>
    </div>

    <button class="btn-reset" onclick="resetData()">HARD RESET DATA</button>

    <div id="groups-container" class="groups-grid"></div>

<script>
const ITERATIONS = 100000; 
const SCORES = [[3,0],[3,1],[3,2],[2,3],[1,3],[0,3]];

let data = JSON.parse(localStorage.getItem('rlcs_paris_final')) || {
    groups: Array.from({length: 4}, (_, i) => ({
        id: i,
        name: `GROUP ${String.fromCharCode(65 + i)}`,
        teams: Array.from({length: 4}, (_, j) => ({
            id: j, name: `TEAM ${String.fromCharCode(65+i)}${j+1}`, seed: j + 1
        })),
        matches: [
            {id: 0, t1: 0, t2: 3, s1: null, s2: null, g1: 0, g2: 0},
            {id: 1, t1: 1, t2: 2, s1: null, s2: null, g1: 0, g2: 0},
            {id: 2, t1: 0, t2: 2, s1: null, s2: null, g1: 0, g2: 0},
            {id: 3, t1: 1, t2: 3, s1: null, s2: null, g1: 0, g2: 0},
            {id: 4, t1: 0, t2: 1, s1: null, s2: null, g1: 0, g2: 0},
            {id: 5, t1: 2, t2: 3, s1: null, s2: null, g1: 0, g2: 0}
        ]
    }))
};

function formatProb(count) {
    if (count === 0) return "0.00";
    if (count === ITERATIONS) return "100.00";
    let p = (count / ITERATIONS) * 100;
    if (p > 0 && p < 0.01) return "0.01";
    if (p > 99.99 && p < 100) return "99.99";
    return p.toFixed(2);
}

function getSortedStandings(teams, matches) {
    return [...teams].sort((a, b) => {
        const stats = (id) => {
            let sW = 0, gW = 0, gL = 0, glF = 0, glA = 0;
            for(let i=0; i<matches.length; i++){
                const m = matches[i];
                if (m.s1 === null) continue;
                if (m.t1 === id) { sW += (m.s1>m.s2?1:0); gW += m.s1; gL += m.s2; glF += m.g1; glA += m.g2; }
                else if (m.t2 === id) { sW += (m.s2>m.s1?1:0); gW += m.s2; gL += m.s1; glF += m.g2; glA += m.g1; }
            }
            return { sW, diff: gW - gL, glD: glF - glA };
        };

        const aS = stats(a.id), bS = stats(b.id);
        if (bS.sW !== aS.sW) return bS.sW - aS.sW;

        const tied = teams.filter(t => stats(t.id).sW === aS.sW).map(t => t.id);
        if (tied.length > 1) {
            const h2hM = matches.filter(m => tied.includes(m.t1) && tied.includes(m.t2) && m.s1 !== null);
            const h2h = (id) => {
                let w = 0, gd = 0, gld = 0;
                for(let i=0; i<h2hM.length; i++){
                    const m = h2hM[i];
                    if(m.t1 === id) { w += (m.s1>m.s2?1:0); gd += (m.s1-m.s2); gld += (m.g1-m.g2); }
                    else if(m.t2 === id) { w += (m.s2>m.s1?1:0); gd += (m.s2-m.s1); gld += (m.g2-m.g1); }
                }
                return { w, gd, gld };
            };
            const aH = h2h(a.id), bH = h2h(b.id);
            if (bH.w !== aH.w) return bH.w - aH.w;
            if (bH.gd !== aH.gd) return bH.gd - aH.gd;
            if (bH.gld !== aH.gld) return bH.gld - aH.gld;
        }
        if (bS.diff !== aS.diff) return bS.diff - aS.diff;
        if (bS.glD !== aS.glD) return bS.glD - aS.glD;
        return a.seed - b.seed;
    });
}

function runSim(group) {
    let res = group.teams.map(t => ({ id: t.id, counts: [0,0,0,0] }));
    const fixed = group.matches.filter(m => m.s1 !== null);
    const pend = group.matches.filter(m => m.s1 === null);

    for(let i=0; i<ITERATIONS; i++) {
        const simM = [
            ...fixed,
            ...pend.map(m => {
                const r = SCORES[(Math.random() * 6) | 0];
                return {...m, s1: r[0], s2: r[1], g1: (Math.random()*6)|0, g2: (Math.random()*6)|0};
            })
        ];
        const table = getSortedStandings(group.teams, simM);
        for(let idx=0; idx<4; idx++) {
            const team = table[idx];
            const r = res.find(r => r.id === team.id);
            r.counts[idx]++;
        }
    }
    return res;
}

function render() {
    const container = document.getElementById('groups-container');
    container.innerHTML = '';

    data.groups.forEach(g => {
        const sim = runSim(g);
        const currentTable = getSortedStandings(g.teams, g.matches);
        const card = document.createElement('div');
        card.className = 'group-card';
        
        let html = `<h2>${g.name}</h2><table><thead><tr><th>TEAM</th><th>W-L</th><th>1ST</th><th>2ND</th><th>3RD</th><th>4TH</th></tr></thead><tbody>`;

        currentTable.forEach(team => {
            const s = sim.find(r => r.id === team.id);
            const w = g.matches.filter(m => (m.t1===team.id && m.s1>m.s2) || (m.t2===team.id && m.s2>m.s1)).length;
            const l = g.matches.filter(m => (m.t1===team.id && m.s1<m.s2) || (m.t2===team.id && m.s2<m.s1)).length;

            html += `<tr>
                <td><input class="input-name" value="${team.name}" onchange="updateName(${g.id},${team.id},this.value)"></td>
                <td style="color:#444">${w}-${l}</td>
                ${s.counts.map(c => {
                    const p = formatProb(c);
                    return `<td class="prob-cell" style="background: rgba(226,68,68, ${p/100})">${p}%</td>`;
                }).join('')}
            </tr>`;
        });

        html += `</tbody></table><div class="match-list" id="l-${g.id}">`;
        g.matches.forEach((m, idx) => {
            const t1 = g.teams.find(t => t.id === m.t1);
            const t2 = g.teams.find(t => t.id === m.t2);
            html += `
                <div class="match-item" data-idx="${idx}">
                    <span class="team-name-match" style="text-align:right">${t1.name}</span>
                    <div class="score-box">
                        <input type="number" value="${m.s1??''}" onchange="upd(${g.id},${idx},'s1',this.value)">
                        <input type="number" value="${m.s2??''}" onchange="upd(${g.id},${idx},'s2',this.value)">
                    </div>
                    <span class="team-name-match" style="text-align:left">${t2.name}</span>
                    <div class="goals-row">GOALS: 
                        <input type="number" value="${m.g1}" onchange="upd(${g.id},${idx},'g1',this.value)"> - 
                        <input type="number" value="${m.g2}" onchange="upd(${g.id},${idx},'g2',this.value)">
                    </div>
                </div>`;
        });

        card.innerHTML = html + `</div>`;
        container.appendChild(card);

        new Sortable(document.getElementById(`l-${g.id}`), {
            animation: 150, onEnd: (e) => {
                const mov = data.groups[g.id].matches.splice(e.oldIndex, 1)[0];
                data.groups[g.id].matches.splice(e.newIndex, 0, mov);
                save();
            }
        });
    });
}

function save() { localStorage.setItem('rlcs_paris_final', JSON.stringify(data)); render(); }
function resetData() { if(confirm("¿RESET ALL?")) { localStorage.removeItem('rlcs_paris_final'); location.reload(); } }
function updateName(gi, ti, v) { data.groups[gi].teams.find(t=>t.id===ti).name = v; save(); }
function upd(gi, mi, f, v) { data.groups[gi].matches[mi][f] = v === '' ? null : parseInt(v); save(); }

render();
</script>
</body>
</html>
