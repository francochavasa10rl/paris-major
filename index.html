<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RLCS PARIS MAJOR</title>
<style>
@font-face { font-family: 'Bourgeois'; src: url('fonts/Bourgeois-Bold.ttf') format('truetype'); font-weight: bold; }
:root {
  --bg: #050505; --card-bg: #0f0f0f; --accent: #e24444;
  --text: #fff; --border: #222;
}
* { box-sizing: border-box; font-family: 'Bourgeois', 'Arial Black', sans-serif; text-transform: uppercase; }
body { background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
.header { border-left: 5px solid var(--accent); margin-bottom: 20px; padding: 5px 15px; background: linear-gradient(90deg, #111 0%, transparent 100%); margin-top: 30px; }
.header:first-child { margin-top: 0; }
.header h1 { margin: 4px 0; font-size: 1.1em; letter-spacing: 2px; }
.groups-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
.group-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
td { padding: 8px; text-align: center; color: #fff !important; border-bottom: 1px solid #1a1a1a; }
th { color: #555; font-size: 0.7em; padding-bottom: 10px; }
.input-name { background: transparent; border: none; color: #fff; width: 100%; font-family: inherit; font-weight: bold; outline: none; font-size: 1em; padding: 0; }
.color-picker { width: 20px; height: 20px; border: none; background: transparent; cursor: pointer; padding: 0; margin-right: 8px; }
.prob-cell { font-size: 0.9em; font-weight: bold; }
.matrix-btn { background: var(--accent); color: #000; border: none; padding: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; display: none; }
.matrix-btn.active { display: block; }
.matrix-window { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 20px; overflow: hidden; }
.matrix-controls { display: flex; justify-content: flex-end; padding-bottom: 10px; }
.close-matrix { background: var(--accent); color: #000; border: none; padding: 8px 25px; cursor: pointer; font-weight: bold; font-size: 1em; border-radius: 2px; }
.matrix-wrapper { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; height: calc(100vh - 80px); }
.matrix-section { background: #080808; border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
.matrix-header-info { background: #111; color: var(--accent); font-size: 0.85em; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid var(--accent); }
.matrix-grid { display: grid; grid-template-columns: 50px repeat(6, 1fr); grid-template-rows: 35px repeat(6, 1fr); flex-grow: 1; gap: 1px; background: #222; }
.matrix-cell { background: #0f0f0f; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; font-size: 0.9em; }
.m-head { background: #1a1a1a; color: #777; font-size: 0.6em; }
.m-axis { background: #151515; color: var(--accent); font-size: 0.7em; }
.match-list { display: flex; flex-direction: column; gap: 8px; }
.match-item { background: #121212; padding: 10px; border: 1px solid #222; cursor: grab; transition: transform 0.2s; }
.match-item:active { cursor: grabbing; transform: scale(0.98); }
.match-main { display: grid; grid-template-columns: 1fr 100px 1fr; align-items: center; gap: 15px; }
.score-box input { background: #000; border: 1px solid #333; color: white; width: 40px; height: 40px; text-align: center; font-size: 1.4em; font-weight: bold; outline: none; }
.score-box input:focus { border-color: var(--accent); }
.goals-container { margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
.goals-container input { width: 50px; background: #050505; border: 1px solid #333; color: var(--accent); text-align: center; font-weight: bold; padding: 3px; }
.bracket-board { display: flex; gap: 25px; overflow-x: auto; padding: 20px 0; }
.bracket-col { display: flex; flex-direction: column; gap: 15px; min-width: 220px; }
.b-match { background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
.b-match-title { font-size: 0.65em; color: #888; text-align: center; background: #0a0a0a; padding: 4px; border-bottom: 1px solid #222; }
.b-team { padding: 10px; cursor: pointer; font-size: 0.85em; transition: 0.2s; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 8px; user-select: none; }
.b-team:last-child { border-bottom: none; }
.b-team:hover:not(.tbd) { background: #222; }
.b-team.winner { background: #1e3a1e; color: #fff; font-weight: bold; }
.b-team.loser { opacity: 0.3; }
.b-team.tbd { color: #555; cursor: default; }
.color-bar { width: 5px; height: 100%; border-radius: 2px; display: inline-block; }

/* LCQ Styles */
.lcq-container-inner { padding: 0; }
.lcq-table { width: 100%; border-collapse: collapse; }
.lcq-table th { color: #555; font-size: 0.65em; padding: 5px 8px 10px; text-align: center; letter-spacing: 1px; }
.lcq-table td { padding: 10px 8px; text-align: center; border-bottom: 1px solid #151515; font-size: 0.85em; }
.lcq-table tr { transition: background 0.3s; }
.lcq-divider td { height: 2px !important; background: var(--accent) !important; padding: 0 !important; }
.lcq-region-name { text-align: left !important; font-size: 0.8em; font-weight: bold; }
.lcq-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; flex-shrink: 0; }
.lcq-prob-bar { display: flex; align-items: center; gap: 6px; justify-content: center; }
.lcq-bar-bg { width: 60px; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
.lcq-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.lcq-secured { background: rgba(0, 220, 100, 0.1) !important; }
.lcq-secured td { color: #00ff88 !important; }
.lcq-loading { text-align: center; padding: 30px; color: #333; font-size: 0.9em; }
.lcq-note { color: #333; font-size: 0.6em; margin: 8px 0 0; }
.rank-top { color: var(--accent); font-weight: bold; }
.lcq-spot-line { height: 1px; background: var(--accent); margin: 5px 0; opacity: 0.5; }
</style>
</head>
<body>

<div class="header"><h1>RLCS PARIS MAJOR — GROUPS</h1></div>
<div id="groups-container" class="groups-grid"></div>

<div class="header"><h1>PLAYOFFS BRACKET</h1></div>
<div id="bracket-container" class="bracket-board"></div>

<div class="header"><h1>LCQ STANDINGS — WORLD CHAMPIONSHIP SPOTS</h1></div>
<div id="lcq-container" class="group-card">
  <div class="lcq-loading">⏳ CALCULANDO SIMULACIONES...</div>
</div>

<div id="matrix-window" class="matrix-window">
  <div class="matrix-controls"><button class="close-matrix" onclick="closeMatrix()">✕ CERRAR</button></div>
  <div id="matrix-content" class="matrix-wrapper"></div>
</div>

<script>
const SCORES = [[3,0],[3,1],[3,2],[2,3],[1,3],[0,3]];

// ── M1 (Boston Major) regional data ─────────────────────────────────────────
const M1 = {
  EU:   { total: 72, best: 30, teams: 5 },
  NA:   { total: 32, best: 14, teams: 4 },
  MENA: { total: 19, best: 14, teams: 2 },
  OCE:  { total: 5,  best: 5,  teams: 1 },
  SAM:  { total: 8,  best: 5,  teams: 2 },
  SSA:  { total: 3,  best: 3,  teams: 1 },
  APAC: { total: 3,  best: 3,  teams: 1 }
};

// GROUP_REGIONS[groupIndex][teamId 0-3] = region code
const GR = [
  ['EU',   'EU',  'OCE',  'NA'  ],  // A: Vitality, KC, Wildcard, FUT
  ['NA',   'SAM', 'EU',   'SSA' ],  // B: NRG, MIBR, ManCity, FiveFears
  ['MENA', 'EU',  'NA',   'APAC'],  // C: TM, NiP, Shopify, TSM
  ['EU',   'NA',  'MENA', 'SAM' ]   // D: GM, Spacestation, R8, FURIA
];

const REGIONS = {
  EU:   { name: 'Europe',             color: '#1565c0' },
  NA:   { name: 'North America',      color: '#c62828' },
  MENA: { name: 'Middle East',        color: '#f9a825' },
  OCE:  { name: 'Oceania',            color: '#00838f' },
  SAM:  { name: 'South America',      color: '#2e7d32' },
  SSA:  { name: 'Sub-Saharan Africa', color: '#7b1fa2' },
  APAC: { name: 'Asia-Pacific',       color: '#c2185b' }
};

// Default team names/colors (A1–D4 seeds)
const DEF = [
  [{n:'Team Vitality',c:'#f5e900'},{n:'Karmine Corp',c:'#4040dd'},{n:'Wildcard',c:'#00c4aa'},{n:'FUT Esports',c:'#ff6600'}],
  [{n:'NRG Esports',c:'#dd0000'},{n:'MIBR',c:'#00920a'},{n:'Manchester City',c:'#6cabdd'},{n:'Five Fears',c:'#aa00ff'}],
  [{n:'Twisted Minds',c:'#cc00ff'},{n:'Ninjas In Pyjamas',c:'#f4bc00'},{n:'Shopify Rebellion',c:'#96bf48'},{n:'TSM',c:'#00b2d0'}],
  [{n:'Gentle Mates',c:'#ff4d8f'},{n:'Spacestation',c:'#00e5ff'},{n:'R8 Esports',c:'#ff3300'},{n:'FURIA Esports',c:'#cccccc'}]
];

let data = JSON.parse(localStorage.getItem('rlcs_paris_v2')) || {
  groups: DEF.map((teams, i) => ({
    id: i,
    name: `GROUP ${String.fromCharCode(65+i)}`,
    teams: teams.map((t, j) => ({id: j, name: t.n, seed: j+1, color: t.c})),
    matches: [
      {t1:0,t2:3,s1:null,s2:null,g1:0,g2:0},
      {t1:1,t2:2,s1:null,s2:null,g1:0,g2:0},
      {t1:0,t2:2,s1:null,s2:null,g1:0,g2:0},
      {t1:1,t2:3,s1:null,s2:null,g1:0,g2:0},
      {t1:0,t2:1,s1:null,s2:null,g1:0,g2:0},
      {t1:2,t2:3,s1:null,s2:null,g1:0,g2:0}
    ]
  })),
  bracket: {}
};
if (!data.bracket) data.bracket = {};

// ── Core group logic ─────────────────────────────────────────────────────────
function getSortedStandings(teams, matches) {
  return [...teams].sort((a, b) => {
    const stats = id => {
      let sW=0, gW=0, gL=0, glF=0, glA=0;
      matches.forEach(m => {
        if (m.s1===3 || m.s2===3) {
          if (m.t1===id) { sW+=(m.s1>m.s2?1:0); gW+=m.s1; gL+=m.s2; glF+=m.g1; glA+=m.g2; }
          else if (m.t2===id) { sW+=(m.s2>m.s1?1:0); gW+=m.s2; gL+=m.s1; glF+=m.g2; glA+=m.g1; }
        }
      });
      return {sW, diff: gW-gL, glD: glF-glA};
    };
    const aS=stats(a.id), bS=stats(b.id);
    if (bS.sW!==aS.sW) return bS.sW-aS.sW;
    if (bS.diff!==aS.diff) return bS.diff-aS.diff;
    if (bS.glD!==aS.glD) return bS.glD-aS.glD;
    return a.seed-b.seed;
  });
}

function checkMatrixEligibility(g) {
  const pend = g.matches.filter(m => m.s1===null || (m.s1<3 && m.s2<3));
  if (pend.length!==2) return false;
  const ids = new Set(); pend.forEach(m => {ids.add(m.t1); ids.add(m.t2);});
  return ids.size===4;
}

// ── Matrix overlay ────────────────────────────────────────────────────────────
function openMatrix(groupId) {
  const g = data.groups[groupId];
  const pend = g.matches.filter(m => m.s1===null || (m.s1<3 && m.s2<3));
  document.getElementById('matrix-window').style.display = 'block';
  const content = document.getElementById('matrix-content');
  const m1=pend[0], m2=pend[1];
  const t1a=g.teams.find(t=>t.id===m1.t1).name, t1b=g.teams.find(t=>t.id===m1.t2).name;
  const t2a=g.teams.find(t=>t.id===m2.t1).name, t2b=g.teams.find(t=>t.id===m2.t2).name;
  let html='';
  for (let pos=0; pos<4; pos++) {
    html+=`<div class="matrix-section"><div class="matrix-header-info"><span>${pos+1}º PUESTO</span><span>M1: ${t1a}-${t1b} | M2: ${t2a}-${t2b}</span></div><div class="matrix-grid"><div class="matrix-cell m-head">M1\\M2</div>`;
    SCORES.forEach(s=>html+=`<div class="matrix-cell m-axis">${s[0]}-${s[1]}</div>`);
    SCORES.forEach(s1=>{
      html+=`<div class="matrix-cell m-axis">${s1[0]}-${s1[1]}</div>`;
      SCORES.forEach(s2=>{
        const sim=g.matches.map(m=>m===m1?{...m,s1:s1[0],s2:s1[1]}:(m===m2?{...m,s1:s2[0],s2:s2[1]}:m));
        const team=getSortedStandings(g.teams,sim)[pos];
        const lum=(parseInt(team.color.slice(1,3),16)*299+parseInt(team.color.slice(3,5),16)*587+parseInt(team.color.slice(5,7),16)*114)/1000;
        html+=`<div class="matrix-cell" style="background:${team.color};color:${lum>128?'#000':'#fff'}">${team.name}</div>`;
      });
    });
    html+=`</div></div>`;
  }
  content.innerHTML=html;
}
function closeMatrix() { document.getElementById('matrix-window').style.display='none'; }

// ── Bracket ──────────────────────────────────────────────────────────────────
function getBracketTeams() {
  const groups = data.groups.map(g => {
    const certainty = g.teams.map(t => ({id:t.id, counts:[0,0,0,0]}));
    for (let i=0;i<5000;i++) {
      const simM=g.matches.map(m=>{
        if(m.s1===3||m.s2===3) return m;
        let c1=0,c2=0;
        while(c1<3&&c2<3) Math.random()>.5?c1++:c2++;
        return {...m,s1:c1,s2:c2};
      });
      const res=getSortedStandings(g.teams,simM);
      for(let idx=0;idx<4;idx++) certainty.find(x=>x.id===res[idx].id).counts[idx]++;
    }
    const sorted=getSortedStandings(g.teams,g.matches);
    const getSecure=pos=>{
      const t=sorted[pos];
      const s=certainty.find(x=>x.id===t.id);
      return s.counts[pos]===5000?t:null;
    };
    return {getSecure};
  });
  const m={
    UBQF1:[groups[0].getSecure(0),groups[3].getSecure(0)],
    UBQF2:[groups[1].getSecure(0),groups[2].getSecure(0)],
    LBR1_1:[groups[2].getSecure(1),groups[3].getSecure(2)],
    LBR1_2:[groups[1].getSecure(1),groups[0].getSecure(2)],
    LBR1_3:[groups[3].getSecure(1),groups[2].getSecure(2)],
    LBR1_4:[groups[0].getSecure(1),groups[1].getSecure(2)],
  };
  const getW=id=>data.bracket[id]?m[id][data.bracket[id]-1]:null;
  const getL=id=>data.bracket[id]?m[id][data.bracket[id]===1?1:0]:null;
  m.LBR2_1=[getW('LBR1_1'),getW('LBR1_2')];
  m.LBR2_2=[getW('LBR1_3'),getW('LBR1_4')];
  m.LBQF1=[getL('UBQF1'),getW('LBR2_1')];
  m.LBQF2=[getL('UBQF2'),getW('LBR2_2')];
  m.SF1=[getW('UBQF2'),getW('LBQF1')];
  m.SF2=[getW('UBQF1'),getW('LBQF2')];
  m.GF=[getW('SF1'),getW('SF2')];
  return m;
}

function selectWinner(matchId, winnerIndex) {
  data.bracket[matchId] = data.bracket[matchId]===winnerIndex ? null : winnerIndex;
  save();
}

function renderMatchHTML(mId, label, mData, p1, p2) {
  const t1=mData[0], t2=mData[1], w=data.bracket[mId];
  const t1C=t1?(w===1?'winner':(w===2?'loser':'')):'tbd';
  const t2C=t2?(w===2?'winner':(w===1?'loser':'')):'tbd';
  const t1Cl=t1&&t2?`onclick="selectWinner('${mId}',1)"`:'';
  const t2Cl=t1&&t2?`onclick="selectWinner('${mId}',2)"`:'';
  const cb=(t)=>t?`<div class="color-bar" style="background:${t.color}"></div>&nbsp;`:'';
  return `<div class="b-match">
    <div class="b-match-title">${label}</div>
    <div class="b-team ${t1C}" ${t1Cl}>${cb(t1)}${t1?t1.name:p1}</div>
    <div class="b-team ${t2C}" ${t2Cl}>${cb(t2)}${t2?t2.name:p2}</div>
  </div>`;
}

function renderBracket() {
  const m=getBracketTeams();
  document.getElementById('bracket-container').innerHTML=`
  <div class="bracket-col">
    ${renderMatchHTML('UBQF1','UPPER QF 1',m.UBQF1,'A1','D1')}
    ${renderMatchHTML('UBQF2','UPPER QF 2',m.UBQF2,'B1','C1')}
    <div style="height:30px"></div>
    ${renderMatchHTML('LBR1_1','LOWER R1 #1',m.LBR1_1,'C2','D3')}
    ${renderMatchHTML('LBR1_2','LOWER R1 #2',m.LBR1_2,'B2','A3')}
    ${renderMatchHTML('LBR1_3','LOWER R1 #3',m.LBR1_3,'D2','C3')}
    ${renderMatchHTML('LBR1_4','LOWER R1 #4',m.LBR1_4,'A2','B3')}
  </div>
  <div class="bracket-col" style="justify-content:flex-end;padding-bottom:25px">
    ${renderMatchHTML('LBR2_1','LOWER R2 #1',m.LBR2_1,'W LBR1 #1','W LBR1 #2')}
    <div style="height:45px"></div>
    ${renderMatchHTML('LBR2_2','LOWER R2 #2',m.LBR2_2,'W LBR1 #3','W LBR1 #4')}
  </div>
  <div class="bracket-col" style="justify-content:flex-end;padding-bottom:60px">
    ${renderMatchHTML('LBQF1','LOWER QF 1',m.LBQF1,'L UBQF1','W LBR2 #1')}
    <div style="height:60px"></div>
    ${renderMatchHTML('LBQF2','LOWER QF 2',m.LBQF2,'L UBQF2','W LBR2 #2')}
  </div>
  <div class="bracket-col" style="justify-content:center;gap:80px">
    ${renderMatchHTML('SF1','SEMIFINAL 1',m.SF1,'W UBQF2','W LBQF1')}
    ${renderMatchHTML('SF2','SEMIFINAL 2',m.SF2,'W UBQF1','W LBQF2')}
  </div>
  <div class="bracket-col" style="justify-content:center">
    ${renderMatchHTML('GF','GRAND FINAL',m.GF,'W SF1','W SF2')}
  </div>`;
}

// ── LCQ Simulation ────────────────────────────────────────────────────────────
function simTournamentOnce() {
  const pts = {};
  // Simulate all 4 groups
  const st = data.groups.map((g, gi) => {
    const sm = g.matches.map(m => {
      if (m.s1===3||m.s2===3) return m;
      let a=0,b=0; while(a<3&&b<3) Math.random()>.5?a++:b++;
      return {...m,s1:a,s2:b};
    });
    return getSortedStandings(g.teams, sm).map(t=>({...t,gi}));
  });

  // 4th place → 13-16th = 4 pts
  st.forEach((s,gi) => pts[`${gi}-${s[3].id}`]=4);

  // Bracket: play(matchId, t1, t2) → [winner, loser]
  const pl=(id,t1,t2)=>{
    if(!t1||!t2) return [t1,t2];
    const r=data.bracket[id];
    if(r) return r===1?[t1,t2]:[t2,t1];
    return Math.random()>.5?[t1,t2]:[t2,t1];
  };

  const [u1w,u1l]=pl('UBQF1',st[0][0],st[3][0]);
  const [u2w,u2l]=pl('UBQF2',st[1][0],st[2][0]);
  const [r1w,r1l]=pl('LBR1_1',st[2][1],st[3][2]);
  const [r2w,r2l]=pl('LBR1_2',st[1][1],st[0][2]);
  const [r3w,r3l]=pl('LBR1_3',st[3][1],st[2][2]);
  const [r4w,r4l]=pl('LBR1_4',st[0][1],st[1][2]);
  [r1l,r2l,r3l,r4l].forEach(t=>{if(t) pts[`${t.gi}-${t.id}`]=6;}); // 9-12th = 6 pts

  const [l21w,l21l]=pl('LBR2_1',r1w,r2w);
  const [l22w,l22l]=pl('LBR2_2',r3w,r4w);
  [l21l,l22l].forEach(t=>{if(t) pts[`${t.gi}-${t.id}`]=8;}); // 7-8th = 8 pts

  const [q1w,q1l]=pl('LBQF1',u1l,l21w);
  const [q2w,q2l]=pl('LBQF2',u2l,l22w);
  [q1l,q2l].forEach(t=>{if(t) pts[`${t.gi}-${t.id}`]=12;}); // 5-6th = 12 pts

  const [s1w,s1l]=pl('SF1',u2w,q1w);
  const [s2w,s2l]=pl('SF2',u1w,q2w);
  [s1l,s2l].forEach(t=>{if(t) pts[`${t.gi}-${t.id}`]=16;}); // 3-4th = 16 pts

  const [gw,gl]=pl('GF',s1w,s2w);
  if(gw) pts[`${gw.gi}-${gw.id}`]=36;  // 1st = 36 pts
  if(gl) pts[`${gl.gi}-${gl.id}`]=24;  // 2nd = 24 pts

  return pts;
}

function calcLCQ(teamPts) {
  const m2={};
  Object.keys(REGIONS).forEach(r=>m2[r]={total:0,best:0});
  data.groups.forEach((g,gi)=>{
    g.teams.forEach(t=>{
      const p=teamPts[`${gi}-${t.id}`]||0;
      const r=GR[gi][t.id];
      m2[r].total+=p;
      if(p>m2[r].best) m2[r].best=p;
    });
  });
  return Object.keys(REGIONS).map(r=>{
    const d=M1[r];
    const avg=(d.total+m2[r].total)/(2*d.teams);
    const best=d.best+m2[r].best;
    return {r, avg, best, m2Total:m2[r].total, m2Best:m2[r].best};
  }).sort((a,b)=>Math.abs(b.avg-a.avg)>0.0001?b.avg-a.avg:b.best-a.best);
}

function runLCQSim(n=100000) {
  const cnt={}, m2s={}, bst={};
  Object.keys(REGIONS).forEach(r=>{cnt[r]=0; m2s[r]=0; bst[r]=0;});
  for(let i=0;i<n;i++){
    const p=simTournamentOnce();
    const s=calcLCQ(p);
    s.slice(0,4).forEach(x=>cnt[x.r]++);
    s.forEach(x=>{m2s[x.r]+=x.m2Total; bst[x.r]+=x.m2Best;});
  }
  return Object.keys(REGIONS).map(r=>({
    r, prob:cnt[r]/n,
    expM2:m2s[r]/n,
    expBest:bst[r]/n
  })).sort((a,b)=>{
    if(Math.abs(b.prob-a.prob)>0.0001) return b.prob-a.prob;
    // tiebreak by projected avg
    const avgA=(M1[a.r].total+a.expM2)/(2*M1[a.r].teams);
    const avgB=(M1[b.r].total+b.expM2)/(2*M1[b.r].teams);
    return avgB-avgA;
  });
}

function renderLCQ() {
  const N=100000;
  const sim=runLCQSim(N);

  let html=`<div class="lcq-container-inner">
  <p style="color:#444;font-size:0.65em;margin:0 0 12px;letter-spacing:1px">
    ▸ TOP 4 REGIONES CLASIFICAN AL LCQ MUNDIAL &nbsp;|&nbsp; ${N.toLocaleString()} SIMULACIONES
  </p>
  <table class="lcq-table">
  <thead><tr>
    <th>#</th>
    <th style="text-align:left">REGIÓN</th>
    <th>M1 TOTAL</th>
    <th>M2 ESPERADO</th>
    <th>TOTAL ESP.</th>
    <th>AVG ESP.</th>
    <th>MEJOR ESP.</th>
    <th>SPOT LCQ %</th>
  </tr></thead><tbody>`;

  sim.forEach((s,i)=>{
    const ri=REGIONS[s.r];
    const m1d=M1[s.r];
    const expM2=s.expM2;
    const expTotal=m1d.total+expM2;
    const expAvg=expTotal/(2*m1d.teams);
    const expBest=m1d.best+s.expBest;
    const prob=s.prob;

    const isSecured=prob>=0.9999;
    const isElim=prob<=0.0001;
    const isTop4=i<4;

    // Insert divider between rank 4 and 5
    if(i===4) html+=`<tr class="lcq-divider"><td colspan="8"></td></tr>`;

    const probPct=isSecured?'100%':isElim?'0%':`${(prob*100).toFixed(1)}%`;
    let probColor;
    if(isSecured) probColor='#00ff88';
    else if(isElim) probColor='#333';
    else if(prob>=0.7) probColor='#4caf50';
    else if(prob>=0.4) probColor='#f9a825';
    else probColor='#e57373';

    const barColor=isSecured?'#00ff88':isElim?'#333':(prob>=0.7?'#4caf50':prob>=0.4?'#f9a825':'#e57373');

    html+=`<tr style="${isSecured?'background:rgba(0,220,100,0.1)':''}">
      <td class="${isTop4?'rank-top':''}" style="color:${isTop4?'var(--accent)':'#444'}">${i+1}</td>
      <td class="lcq-region-name">
        <span class="lcq-dot" style="background:${ri.color}"></span>${ri.name}
      </td>
      <td style="color:#888">${m1d.total}</td>
      <td>${expM2.toFixed(1)}</td>
      <td style="font-weight:bold;color:${isTop4?'#fff':'#888'}">${expTotal.toFixed(1)}</td>
      <td style="color:${isTop4?'#fff':'#666'}">${expAvg.toFixed(2)}</td>
      <td style="color:#666">${expBest.toFixed(1)}</td>
      <td>
        <div class="lcq-prob-bar">
          <div class="lcq-bar-bg"><div class="lcq-bar-fill" style="width:${Math.round(prob*100)}%;background:${barColor}"></div></div>
          <span style="color:${probColor};font-weight:bold;min-width:48px;font-size:0.95em">${isSecured?'✓ 100%':probPct}</span>
        </div>
      </td>
    </tr>`;
  });

  html+=`</tbody></table>
  <p class="lcq-note">* VALORES M2 PROYECTADOS POR SIMULACIÓN • CRITERIO 1: AVG PTS/EQUIPO • CRITERIO 2: MEJOR RESULTADO ACUMULADO</p>
  </div>`;

  document.getElementById('lcq-container').innerHTML=html;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  // Groups
  const container=document.getElementById('groups-container');
  container.innerHTML='';
  data.groups.forEach(g=>{
    // Group probability simulation (30k)
    const simR=(()=>{
      let r=g.teams.map(t=>({id:t.id,counts:[0,0,0,0]}));
      for(let i=0;i<100000;i++){
        const sm=g.matches.map(m=>{
          if(m.s1===3||m.s2===3) return m;
          let c1=0,c2=0; while(c1<3&&c2<3) Math.random()>.5?c1++:c2++;
          return {...m,s1:c1,s2:c2,g1:0,g2:0};
        });
        const res=getSortedStandings(g.teams,sm);
        for(let idx=0;idx<4;idx++) r.find(x=>x.id===res[idx].id).counts[idx]++;
      }
      return r;
    })();

    const card=document.createElement('div');
    card.className='group-card';
    const elig=checkMatrixEligibility(g);
    let html=`<h2 style="margin:0 0 10px;font-size:1em;letter-spacing:2px">${g.name}</h2>`;
    html+=`<button class="matrix-btn ${elig?'active':''}" onclick="openMatrix(${g.id})">GENERAR MATRIZ FINAL</button>`;
    html+=`<table><thead><tr><th>EQUIPO</th><th>SERIES</th><th>GAMES</th><th>1º</th><th>2º</th><th>3º</th><th>4º</th></tr></thead><tbody>`;

    getSortedStandings(g.teams,g.matches).forEach(team=>{
      const s=simR.find(x=>x.id===team.id);
      let sW=0,sL=0,gW=0,gL=0;
      g.matches.forEach(m=>{
        if(m.s1===3||m.s2===3){
          if(m.t1===team.id){sW+=(m.s1>m.s2?1:0);sL+=(m.s1<m.s2?1:0);gW+=m.s1;gL+=m.s2;}
          else if(m.t2===team.id){sW+=(m.s2>m.s1?1:0);sL+=(m.s2<m.s1?1:0);gW+=m.s2;gL+=m.s1;}
        }
      });
      html+=`<tr>
        <td style="text-align:left;display:flex;align-items:center">
          <input type="color" class="color-picker" value="${team.color}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).color=this.value;save()">
          <input class="input-name" value="${team.name}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).name=this.value;save()">
        </td>
        <td>${sW}-${sL}</td><td>${gW}-${gL}</td>
        ${s.counts.map(c=>{
          const p=c/100000;
          return `<td class="prob-cell" style="background:rgba(226,68,68,${p});color:${p>0.4?'#fff':'#666'}">${(p*100).toFixed(1)}%</td>`;
        }).join('')}
      </tr>`;
    });

    html+=`</tbody></table><div class="match-list" id="list-${g.id}">`;
    g.matches.forEach((m,mi)=>{
      const t1=g.teams.find(t=>t.id===m.t1), t2=g.teams.find(t=>t.id===m.t2);
      html+=`<div class="match-item" draggable="true" ondragstart="drag(${g.id},${mi})" ondragover="allowDrop(event)" ondrop="drop(${g.id},${mi})">
        <div class="match-main">
          <span style="text-align:right;font-weight:bold">${t1.name}</span>
          <div class="score-box">
            <input type="number" value="${m.s1??''}" onchange="upd(${g.id},${mi},'s1',this.value)">
            <input type="number" value="${m.s2??''}" onchange="upd(${g.id},${mi},'s2',this.value)">
          </div>
          <span style="text-align:left;font-weight:bold">${t2.name}</span>
        </div>
        <div class="goals-container">
          <span style="font-size:0.6em;color:#444">GOLES:</span>
          <input type="number" value="${m.g1}" onchange="upd(${g.id},${mi},'g1',this.value)">
          <span style="color:#444">-</span>
          <input type="number" value="${m.g2}" onchange="upd(${g.id},${mi},'g2',this.value)">
        </div>
      </div>`;
    });
    card.innerHTML=html+'</div>';
    container.appendChild(card);
  });

  renderBracket();

  // LCQ: render async to not block the groups/bracket UI
  document.getElementById('lcq-container').innerHTML='<div class="lcq-loading">⏳ CALCULANDO 30,000 SIMULACIONES...</div>';
  setTimeout(renderLCQ, 50);
}

let draggedMatch=null;
function drag(gi,mi){draggedMatch={gi,mi};}
function allowDrop(e){e.preventDefault();}
function drop(gi,mi){
  if(draggedMatch.gi!==gi) return;
  const list=data.groups[gi].matches;
  const item=list.splice(draggedMatch.mi,1)[0];
  list.splice(mi,0,item);
  save();
}
function upd(gi,mi,f,v){
  data.groups[gi].matches[mi][f]=v===''?null:parseInt(v);
  save();
}
function save(){
  localStorage.setItem('rlcs_paris_v2',JSON.stringify(data));
  render();
}

render();
</script>
