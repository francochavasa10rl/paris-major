<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRL Scenario Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @font-face { font-family: 'Bourgeois'; src: url('fonts/Bourgeois-Bold.ttf'); font-weight: bold; }
        @font-face { font-family: 'Bourgeois'; src: url('fonts/Bourgeois-Medium.otf'); font-weight: 500; }

        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --accent: #ff4e00;
            --text: #ffffff;
            --border: #333;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Bourgeois', sans-serif;
            margin: 0;
            padding: 20px;
            text-transform: uppercase;
        }

        .header { border-bottom: 4px solid var(--accent); margin-bottom: 30px; padding-bottom: 10px; }
        
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 40px;
        }

        .group-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
        }

        h2 { color: var(--accent); letter-spacing: 1px; margin-top: 0; }

        /* Estilos de Tabla */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 0.9em; }
        th { background: #222; text-align: left; padding: 10px; border-bottom: 2px solid var(--border); }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        .input-name { background: transparent; border: 1px dashed #555; color: white; font-family: inherit; width: 120px; }
        
        /* Colores de probabilidad */
        .prob-cell { font-weight: bold; text-align: center; }
        .high-prob { background: rgba(0, 255, 0, 0.2); }
        .low-prob { background: rgba(255, 0, 0, 0.2); }

        /* Partidos */
        .match-list { margin-top: 20px; }
        .match-item {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.5fr 1fr;
            align-items: center;
            background: #252525;
            margin: 5px 0;
            padding: 8px;
            border-radius: 3px;
            font-size: 0.8em;
        }
        .match-item input {
            background: #111; border: 1px solid #444; color: white;
            text-align: center; width: 35px; margin: 0 2px;
        }
        .goals-container { font-size: 0.7em; color: #888; }

        .btn-reset {
            background: var(--accent); color: white; border: none;
            padding: 10px 20px; cursor: pointer; font-family: inherit;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>CRL SPRING 2026 - CHAMPIONSHIP SCENARIOS</h1>
    </div>

    <button class="btn-reset" onclick="resetData()">Limpiar Todo (Reset)</button>

    <div id="groups-container" class="groups-grid"></div>

<script>
// --- Lógica del Sistema ---
const ITERATIONS = 10000; // Monte Carlo masivo para estabilidad
const SCORE_POSSIBILITIES = [[3,0],[3,1],[3,2],[2,3],[1,3],[0,3]];

let data = JSON.parse(localStorage.getItem('crl_data_v2')) || {
    groups: Array.from({length: 4}, (_, i) => ({
        id: i,
        name: `GRUPO ${String.fromCharCode(65 + i)}`,
        teams: Array.from({length: 4}, (_, j) => ({
            id: j, name: `TEAM ${j + 1}`, seed: j + 1
        })),
        matches: [
            {id: 0, t1: 0, t2: 3, s1: null, s2: null, g1: 0, g2: 0},
            {id: 1, t1: 1, t2: 2, s1: null, s2: null, g1: 0, g2: 0},
            {id: 2, t1: 0, t2: 2, s1: null, s2: null, g1: 0, g2: 0},
            {id: 3, t1: 1, t2: 3, s1: null, s2: null, g1: 0, g2: 0},
            {id: 4, t1: 0, t2: 1, s1: null, s2: null, g1: 0, g2: 0},
            {id: 5, t1: 2, t2: 3, s1: null, s2: null, g1: 0, g2: 0}
        ]
    }))
};

function save() {
    localStorage.setItem('crl_data_v2', JSON.stringify(data));
    render();
}

function resetData() {
    if(confirm("¿Seguro que quieres borrar todos los nombres y resultados?")) {
        localStorage.removeItem('crl_data_v2');
        location.reload();
    }
}

// --- Motor de Desempate (Tus 6 criterios) ---
function getSortedStandings(teams, matches) {
    return [...teams].sort((a, b) => {
        const stats = (teamId) => {
            let sWins = 0, gWins = 0, gLoss = 0, goalsF = 0, goalsA = 0;
            matches.forEach(m => {
                if (m.s1 === null) return;
                if (m.t1 === teamId) {
                    if (m.s1 > m.s2) sWins++;
                    gWins += m.s1; gLoss += m.s2; goalsF += m.g1; goalsA += m.g2;
                } else if (m.t2 === teamId) {
                    if (m.s2 > m.s1) sWins++;
                    gWins += m.s2; gLoss += m.s1; goalsF += m.g2; goalsA += m.g1;
                }
            });
            return { sWins, gDiff: gWins - gLoss, goalsDiff: goalsF - goalsA };
        };

        const aS = stats(a.id), bS = stats(b.id);
        
        // 0. Victorias de Serie totales
        if (bS.sWins !== aS.sWins) return bS.sWins - aS.sWins;

        // Identificar grupo de empate para H2H
        const tiedIds = teams.filter(t => stats(t.id).sWins === aS.sWins).map(t => t.id);
        if (tiedIds.length > 1) {
            const h2hMatches = matches.filter(m => tiedIds.includes(m.t1) && tiedIds.includes(m.t2) && m.s1 !== null);
            
            const h2hStats = (id) => {
                let wins = 0, gW = 0, gL = 0, glF = 0, glA = 0;
                h2hMatches.forEach(m => {
                    if (m.t1 === id) { wins += (m.s1>m.s2?1:0); gW += m.s1; gL += m.s2; glF += m.g1; glA += m.g2; }
                    else if (m.t2 === id) { wins += (m.s2>m.s1?1:0); gW += m.s2; gL += m.s1; glF += m.g2; glA += m.g1; }
                });
                return { wins, gDiff: gW - gL, glDiff: glF - glA };
            };

            const aH = h2hStats(a.id), bH = h2hStats(b.id);
            // 1. H2H Series
            if (bH.wins !== aH.wins) return bH.wins - aH.wins;
            // 2. H2H Partidos (Games)
            if (bH.gDiff !== aH.gDiff) return bH.gDiff - aH.gDiff;
        }

        // 3. Diferencial Partidos Total
        if (bS.gDiff !== aS.gDiff) return bS.gDiff - aS.gDiff;
        
        // 4. Goles H2H (Simplificado: si hay empate total se usa el global del criterio 5)
        // 5. Diferencial Goles Total
        if (bS.goalsDiff !== aS.goalsDiff) return bS.goalsDiff - aS.goalsDiff;

        // 6. Seed
        return a.seed - b.seed;
    });
}

function runSimulation(group) {
    let results = group.teams.map(t => ({ id: t.id, pos: [0,0,0,0] }));
    
    for (let i = 0; i < ITERATIONS; i++) {
        const simMatches = group.matches.map(m => {
            if (m.s1 !== null) return m;
            const res = SCORE_POSSIBILITIES[Math.floor(Math.random() * 6)];
            // Goles random para desempatar criterios 4 y 5
            return { ...m, s1: res[0], s2: res[1], g1: Math.floor(Math.random()*8), g2: Math.floor(Math.random()*8) };
        });
        
        const table = getSortedStandings(group.teams, simMatches);
        table.forEach((team, idx) => {
            results.find(r => r.id === team.id).pos[idx]++;
        });
    }
    return results;
}

// --- Renderizado ---
function render() {
    const container = document.getElementById('groups-container');
    container.innerHTML = '';

    data.groups.forEach(group => {
        const simData = runSimulation(group);
        const currentTable = getSortedStandings(group.teams, group.matches);

        const groupEl = document.createElement('div');
        groupEl.className = 'group-card';
        
        let tableHtml = `
            <h2>${group.name}</h2>
            <table>
                <thead>
                    <tr>
                        <th>Equipo</th><th>REC</th><th>DIF</th>
                        <th>1st</th><th>2nd</th><th>3rd</th><th>4th</th>
                    </tr>
                </thead>
                <tbody>`;

        currentTable.forEach(team => {
            const s = simData.find(r => r.id === team.id);
            // Calcular récord actual
            const mWin = group.matches.filter(m => (m.t1 === team.id && m.s1 > m.s2) || (m.t2 === team.id && m.s2 > m.s1)).length;
            const mLoss = group.matches.filter(m => (m.t1 === team.id && m.s1 < m.s2) || (m.t2 === team.id && m.s2 < m.s1)).length;
            
            let diffTotal = 0;
            group.matches.forEach(m => {
                if(m.s1 === null) return;
                if(m.t1 === team.id) diffTotal += (m.s1 - m.s2);
                if(m.t2 === team.id) diffTotal += (m.s2 - m.s1);
            });

            tableHtml += `
                <tr>
                    <td><input class="input-name" value="${team.name}" onchange="updateName(${group.id}, ${team.id}, this.value)"></td>
                    <td>${mWin}-${mLoss}</td>
                    <td>${diffTotal > 0 ? '+'+diffTotal : diffTotal}</td>
                    ${s.pos.map((count, i) => {
                        const p = ((count/ITERATIONS)*100).toFixed(1);
                        return `<td class="prob-cell" style="background: rgba(255,78,0, ${p/100})">${p}%</td>`;
                    }).join('')}
                </tr>`;
        });

        tableHtml += `</tbody></table><div class="match-list" id="list-${group.id}">`;

        group.matches.forEach((m, mIdx) => {
            const t1 = group.teams.find(t => t.id === m.t1);
            const t2 = group.teams.find(t => t.id === m.t2);
            tableHtml += `
                <div class="match-item" data-idx="${mIdx}">
                    <span>${t1.name}</span>
                    <div>
                        <input type="number" value="${m.s1??''}" placeholder="0" onchange="updateScore(${group.id},${mIdx},'s1',this.value)"> :
                        <input type="number" value="${m.s2??''}" placeholder="0" onchange="updateScore(${group.id},${mIdx},'s2',this.value)">
                    </div>
                    <span>${t2.name}</span>
                    <div class="goals-container">
                        Goles: <input type="number" value="${m.g1}" onchange="updateScore(${group.id},${mIdx},'g1',this.value)"> -
                        <input type="number" value="${m.g2}" onchange="updateScore(${group.id},${mIdx},'g2',this.value)">
                    </div>
                </div>`;
        });

        tableHtml += `</div>`;
        groupEl.innerHTML = tableHtml;
        container.appendChild(groupEl);

        // Sortable para cada grupo
        new Sortable(document.getElementById(`list-${group.id}`), {
            animation: 150,
            onEnd: (evt) => {
                const moved = data.groups[group.id].matches.splice(evt.oldIndex, 1)[0];
                data.groups[group.id].matches.splice(evt.newIndex, 0, moved);
                save();
            }
        });
    });
}

function updateName(gId, tId, val) {
    data.groups[gId].teams.find(t => t.id === tId).name = val;
    save();
}

function updateScore(gId, mIdx, field, val) {
    data.groups[gId].matches[mIdx][field] = val === '' ? null : parseInt(val);
    save();
}

render();
</script>
</body>
</html>
