<script>
const SCORES=[[3,0],[3,1],[3,2],[2,3],[1,3],[0,3]];
const VALID_SCORES=[[3,0],[3,1],[3,2],[0,3],[1,3],[2,3]];

// Logo map: team name → filename in logos/
const LOGOS={
  'Team Vitality':'vitality.png','Karmine Corp':'karmine.png','Wildcard':'wildcard.png','FUT Esports':'fut.png',
  'NRG Esports':'nrg.png','MIBR':'mibr.png','Manchester City':'city.png','Five Fears':'5f.png',
  'Twisted Minds':'twisted.png','Ninjas In Pyjamas':'ninjas.png','Shopify Rebellion':'shopify.png','TSM':'tsm.png',
  'Gentle Mates':'gentlemates.png','Spacestation':'spacestation.png','R8 Esports':'r8.png','FURIA Esports':'furia.png',
  'Virtus Pro':'vp.png','Team Falcons':'falcons.png','KINOTROPE':'kinotrope.png','Pioneers':'pioneers.png',
  'PWR':'pwr.png','BS+COMPETITION':'bs.png',
  // aliases for group display
  'Ninjas In Pyjamas':'ninjas.png'
};
function logo(name,size=22){
  const f=LOGOS[name];
  if(f) return `<img src="logos/${f}" class="team-logo" style="width:${size}px;height:${size}px" onerror="this.style.display='none'">`;
  return `<span style="display:inline-block;width:${size}px;height:${size}px;background:#333;border-radius:2px;vertical-align:middle;margin-right:4px"></span>`;
}

const M1={
  EU:  {total:72,best:30,teams:5},
  NA:  {total:32,best:14,teams:4},
  MENA:{total:19,best:14,teams:2},
  OCE: {total:5, best:5, teams:1},
  SAM: {total:8, best:5, teams:2},
  SSA: {total:3, best:3, teams:1},
  APAC:{total:3, best:3, teams:1}
};
const GR=[
  ['EU','EU','OCE','NA'],
  ['NA','SAM','EU','SSA'],
  ['MENA','EU','NA','APAC'],
  ['EU','NA','MENA','SAM']
];
const REGIONS={
  EU:  {name:'Europe',            color:'#1565c0'},
  NA:  {name:'North America',     color:'#c62828'},
  MENA:{name:'Middle East',       color:'#f9a825'},
  OCE: {name:'Oceania',           color:'#00838f'},
  SAM: {name:'South America',     color:'#2e7d32'},
  SSA: {name:'Sub-Saharan Africa',color:'#7b1fa2'},
  APAC:{name:'Asia-Pacific',      color:'#c2185b'}
};
// base = pre-major total pts (participation 4pts already included in base for major teams)
const REGIONAL_TEAMS={
  EU:[
    {name:'Gentle Mates',   logo:'gentlemates.png',base:93,gi:3, tid:0},
    {name:'Team Vitality',  logo:'vitality.png',   base:85,gi:0, tid:0},
    {name:'Karmine Corp',   logo:'karmine.png',     base:80,gi:0, tid:1},
    {name:'NiP',            logo:'ninjas.png',      base:58,gi:2, tid:1},
    {name:'Manchester City',logo:'city.png',        base:37,gi:1, tid:2},
  ],
  NA:[
    {name:'NRG Esports',      logo:'nrg.png',      base:88,gi:1, tid:0},
    {name:'Shopify Rebellion',logo:'shopify.png',   base:77,gi:2, tid:2},
    {name:'Spacestation',     logo:'spacestation.png',base:65,gi:3,tid:1},
    {name:'Virtus Pro',       logo:'vp.png',        base:46,gi:-1,tid:-1},
    {name:'FUT Esports',      logo:'fut.png',       base:32,gi:0, tid:3},
  ],
  MENA:[
    {name:'Twisted Minds',logo:'twisted.png', base:85,gi:2, tid:0},
    {name:'Team Falcons', logo:'falcons.png', base:78,gi:-1,tid:-1},
    {name:'R8 Esports',   logo:'r8.png',      base:61,gi:3, tid:2},
  ],
  SAM:[
    {name:'MIBR',          logo:'mibr.png',  base:86,gi:1, tid:1},
    {name:'FURIA Esports', logo:'furia.png', base:82,gi:3, tid:3},
    {name:'BS+COMPETITION',logo:'bs.png',    base:45,gi:-1,tid:-1},
  ],
  OCE:[
    {name:'PWR',     logo:'pwr.png',      base:78,gi:-1,tid:-1},
    {name:'Wildcard',logo:'wildcard.png', base:78,gi:0, tid:2},
  ],
  APAC:[
    {name:'TSM',      logo:'tsm.png',      base:96,gi:2, tid:3},
    {name:'KINOTROPE',logo:'kinotrope.png',base:69,gi:-1,tid:-1},
  ],
  SSA:[
    {name:'Five Fears',logo:'5f.png',       base:101,gi:1, tid:3},
    {name:'Pioneers', logo:'pioneers.png',  base:67, gi:-1,tid:-1},
  ],
};
const WORLDS_SPOTS={EU:5,NA:4,MENA:2,SAM:2,OCE:1,APAC:1,SSA:1};

const DEF=[
  [{n:'Team Vitality',c:'#f5e900'},{n:'Karmine Corp',c:'#4040dd'},{n:'Wildcard',c:'#00c4aa'},{n:'FUT Esports',c:'#ff6600'}],
  [{n:'NRG Esports',c:'#dd0000'},{n:'MIBR',c:'#00920a'},{n:'Manchester City',c:'#6cabdd'},{n:'Five Fears',c:'#aa00ff'}],
  [{n:'Twisted Minds',c:'#cc00ff'},{n:'Ninjas In Pyjamas',c:'#f4bc00'},{n:'Shopify Rebellion',c:'#96bf48'},{n:'TSM',c:'#00b2d0'}],
  [{n:'Gentle Mates',c:'#ff4d8f'},{n:'Spacestation',c:'#00e5ff'},{n:'R8 Esports',c:'#ff3300'},{n:'FURIA Esports',c:'#cccccc'}]
];

let data=JSON.parse(localStorage.getItem('rlcs_paris_v7'))||{
  groups:DEF.map((teams,i)=>({
    id:i,name:`GROUP ${String.fromCharCode(65+i)}`,
    teams:teams.map((t,j)=>({id:j,name:t.n,seed:j+1,color:t.c})),
    matches:[
      {t1:0,t2:3,s1:null,s2:null,g1:0,g2:0,done:false},{t1:1,t2:2,s1:null,s2:null,g1:0,g2:0,done:false},
      {t1:0,t2:2,s1:null,s2:null,g1:0,g2:0,done:false},{t1:1,t2:3,s1:null,s2:null,g1:0,g2:0,done:false},
      {t1:0,t2:1,s1:null,s2:null,g1:0,g2:0,done:false},{t1:2,t2:3,s1:null,s2:null,g1:0,g2:0,done:false}
    ]
  })),
  bracket:{}
};
if(!data.bracket) data.bracket={};

// Simulate realistic goal counts for a series (s1 games won by t1, s2 by t2)
function simGoals(s1,s2){
  let g1=0,g2=0;
  for(let i=0;i<s1;i++){const w=1+Math.floor(Math.random()*4);g1+=w;g2+=Math.floor(Math.random()*w);}
  for(let i=0;i<s2;i++){const w=1+Math.floor(Math.random()*4);g2+=w;g1+=Math.floor(Math.random()*w);}
  return{g1,g2};
}

// ── Standings ─────────────────────────────────────────────────────────────────
function getSortedStandings(teams,matches){
  const overall=id=>{
    let sW=0,gW=0,gL=0,glF=0,glA=0;
    matches.forEach(m=>{
      if(m.done&&(m.s1===3||m.s2===3)){
        if(m.t1===id){sW+=(m.s1>m.s2?1:0);gW+=m.s1;gL+=m.s2;glF+=m.g1;glA+=m.g2;}
        else if(m.t2===id){sW+=(m.s2>m.s1?1:0);gW+=m.s2;gL+=m.s1;glF+=m.g2;glA+=m.g1;}
      }
    });
    return{sW,gDiff:gW-gL,glDiff:glF-glA};
  };
  const h2h=(id,opps)=>{
    let sW=0,gW=0,gL=0,glF=0,glA=0;
    const oIds=opps.map(t=>t.id);
    matches.forEach(m=>{
      if(m.done&&(m.s1===3||m.s2===3)){
        if(m.t1===id&&oIds.includes(m.t2)){sW+=(m.s1>m.s2?1:0);gW+=m.s1;gL+=m.s2;glF+=m.g1;glA+=m.g2;}
        else if(m.t2===id&&oIds.includes(m.t1)){sW+=(m.s2>m.s1?1:0);gW+=m.s2;gL+=m.s1;glF+=m.g2;glA+=m.g1;}
      }
    });
    return{sW,gDiff:gW-gL,glDiff:glF-glA};
  };
  const resolveGroup=grp=>{
    if(grp.length<=1) return grp;
    const rivals=t=>grp.filter(x=>x.id!==t.id);
    return [...grp].sort((a,b)=>{
      const ha=h2h(a.id,rivals(a)),hb=h2h(b.id,rivals(b));
      if(hb.sW!==ha.sW) return hb.sW-ha.sW;
      if(hb.gDiff!==ha.gDiff) return hb.gDiff-ha.gDiff;
      const oa=overall(a.id),ob=overall(b.id);
      if(ob.gDiff!==oa.gDiff) return ob.gDiff-oa.gDiff;
      if(hb.glDiff!==ha.glDiff) return hb.glDiff-ha.glDiff;
      if(ob.glDiff!==oa.glDiff) return ob.glDiff-oa.glDiff;
      return a.seed-b.seed;
    });
  };
  const ws=teams.map(t=>({...t,ov:overall(t.id)}));
  ws.sort((a,b)=>b.ov.sW-a.ov.sW);
  const result=[];let i=0;
  while(i<ws.length){
    let j=i;
    while(j<ws.length&&ws[j].ov.sW===ws[i].ov.sW) j++;
    result.push(...resolveGroup(ws.slice(i,j)));
    i=j;
  }
  return result;
}

// ── Confirmed team floor pts (for live standings display) ─────────────────────
function getConfirmedTeamFloor(){
  const floor={};
  data.groups.forEach((g,gi)=>g.teams.forEach(t=>{floor[`${gi}-${t.id}`]=0;}));

  // ── Step 1: Run 3k sims to get confirmed group positions ──────────────────
  const N=3000;
  // counts[gi][teamId][pos] = number of times that team ended in that pos
  const counts=data.groups.map((g,gi)=>{
    const c={};g.teams.forEach(t=>{c[t.id]=[0,0,0,0];});
    for(let i=0;i<N;i++){
      const sm=g.matches.map(m=>{
        if(m.done&&(m.s1===3||m.s2===3)) return m;
        let a=0,b=0;while(a<3&&b<3) Math.random()>.5?a++:b++;
        return{...m,s1:a,s2:b,...simGoals(a,b),done:true};
      });
      getSortedStandings(g.teams,sm).forEach((t,pos)=>c[t.id][pos]++);
    }
    return c;
  });

  // Confirmed if >=95% of sims in that position
  const THR=N*0.95;
  // bracketSlot[slotName] = {gi, tid} or null
  const slot={};

  // Group seeds → bracket slots
  // slot format: 'A1','A2','A3','A4', 'B1'... etc
  data.groups.forEach((g,gi)=>{
    const label=String.fromCharCode(65+gi); // A,B,C,D
    g.teams.forEach(t=>{
      for(let pos=0;pos<4;pos++){
        if(counts[gi][t.id][pos]>=THR){
          slot[`${label}${pos+1}`]={gi,tid:t.id};
        }
      }
    });
  });

  // ── Step 2: Apply minimum floor based on confirmed group position ──────────
  const upd=(key,pts)=>{if(key in floor) floor[key]=Math.max(floor[key],pts);};

  data.groups.forEach((g,gi)=>{
    const label=String.fromCharCode(65+gi);
    g.teams.forEach(t=>{
      const c=counts[gi][t.id];
      const key=`${gi}-${t.id}`;
      // Exactly 0% of finishing that bad or worse → confirmed
      if(c[1]+c[2]+c[3]===0) upd(key,8); // confirmed 1st → UB → min 5-6th (12-4=8 extra)
      else if(c[2]+c[3]===0)  upd(key,2);  // confirmed top 2 → min LB (6-4=2 extra)
      else if(c[3]===0)       upd(key,2);  // confirmed top 3 → min LB (6-4=2 extra)

      // Individual slot for bracket seeding (95% threshold)
      for(let pos=0;pos<4;pos++){
        if(c[pos]>=N*0.95) slot[`${label}${pos+1}`]={gi,tid:t.id};
      }
    });

    // Structural guarantee: if 2+ teams from same region in same group,
    // one of them is ALWAYS guaranteed top 3 (can't both finish 4th).
    // Give the 6pt floor to whichever has fewer 4th-place sim finishes.
    const byR={};
    g.teams.forEach(t=>{const r=GR[gi][t.id];(byR[r]=byR[r]||[]).push(t);});
    Object.values(byR).forEach(rTeams=>{
      if(rTeams.length>=2){
        // The team with fewest 4th-place finishes is the "safer" one
        const best=rTeams.reduce((a,b)=>counts[gi][a.id][3]<=counts[gi][b.id][3]?a:b);
        upd(`${gi}-${best.id}`,2);
      }
    });
  });

  // ── Step 3: Walk bracket using data.bracket picks ─────────────────────────
  // Map bracket match → which group slots feed into it
  const bSlots={
    UBQF1:  ['A1','D1'],
    UBQF2:  ['B1','C1'],
    LBR1_1: ['C2','D3'],
    LBR1_2: ['B2','A3'],
    LBR1_3: ['D2','C3'],
    LBR1_4: ['A2','B3'],
  };

  // For each bracket match, try to resolve winner/loser
  // Returns {w:{gi,tid}, l:{gi,tid}} or {w:null,l:null}
  const bTeams={}; // matchId → {w,l}
  const pick=(id,t1,t2)=>{
    if(!t1||!t2) return{w:null,l:null};
    const p=data.bracket[id];
    if(!p) return{w:null,l:null};
    return p===1?{w:t1,l:t2}:{w:t2,l:t1};
  };

  // Resolve a slot: either a group slot or a bracket winner slot
  const getTeam=(slotName)=>slot[slotName]||null;

  // LBR1 matches
  ['LBR1_1','LBR1_2','LBR1_3','LBR1_4'].forEach(id=>{
    const[s1,s2]=bSlots[id];
    bTeams[id]=pick(id,getTeam(s1),getTeam(s2));
    if(bTeams[id].l) upd(`${bTeams[id].l.gi}-${bTeams[id].l.tid}`,2);  // 9-12th (6-4=2 extra)
    if(bTeams[id].w) upd(`${bTeams[id].w.gi}-${bTeams[id].w.tid}`,4);  // min 7-8th (8-4=4 extra)
  });

  // UBQF matches
  bTeams.UBQF1=pick('UBQF1',getTeam('A1'),getTeam('D1'));
  bTeams.UBQF2=pick('UBQF2',getTeam('B1'),getTeam('C1'));
  if(bTeams.UBQF1.l) upd(`${bTeams.UBQF1.l.gi}-${bTeams.UBQF1.l.tid}`,8); // min 5-6th (12-4=8 extra)
  if(bTeams.UBQF2.l) upd(`${bTeams.UBQF2.l.gi}-${bTeams.UBQF2.l.tid}`,8);
  if(bTeams.UBQF1.w) upd(`${bTeams.UBQF1.w.gi}-${bTeams.UBQF1.w.tid}`,12); // min 3-4th (16-4=12 extra)
  if(bTeams.UBQF2.w) upd(`${bTeams.UBQF2.w.gi}-${bTeams.UBQF2.w.tid}`,12);

  // LBR2
  bTeams.LBR2_1=pick('LBR2_1',bTeams.LBR1_1.w,bTeams.LBR1_2.w);
  bTeams.LBR2_2=pick('LBR2_2',bTeams.LBR1_3.w,bTeams.LBR1_4.w);
  if(bTeams.LBR2_1.l) upd(`${bTeams.LBR2_1.l.gi}-${bTeams.LBR2_1.l.tid}`,4);
  if(bTeams.LBR2_2.l) upd(`${bTeams.LBR2_2.l.gi}-${bTeams.LBR2_2.l.tid}`,4);
  if(bTeams.LBR2_1.w) upd(`${bTeams.LBR2_1.w.gi}-${bTeams.LBR2_1.w.tid}`,8);
  if(bTeams.LBR2_2.w) upd(`${bTeams.LBR2_2.w.gi}-${bTeams.LBR2_2.w.tid}`,8);

  // LBQF
  bTeams.LBQF1=pick('LBQF1',bTeams.UBQF1.l,bTeams.LBR2_1.w);
  bTeams.LBQF2=pick('LBQF2',bTeams.UBQF2.l,bTeams.LBR2_2.w);
  if(bTeams.LBQF1.l) upd(`${bTeams.LBQF1.l.gi}-${bTeams.LBQF1.l.tid}`,8);
  if(bTeams.LBQF2.l) upd(`${bTeams.LBQF2.l.gi}-${bTeams.LBQF2.l.tid}`,8);
  if(bTeams.LBQF1.w) upd(`${bTeams.LBQF1.w.gi}-${bTeams.LBQF1.w.tid}`,12);
  if(bTeams.LBQF2.w) upd(`${bTeams.LBQF2.w.gi}-${bTeams.LBQF2.w.tid}`,12);

  // Semis
  bTeams.SF1=pick('SF1',bTeams.UBQF2.w,bTeams.LBQF1.w);
  bTeams.SF2=pick('SF2',bTeams.UBQF1.w,bTeams.LBQF2.w);
  if(bTeams.SF1.l) upd(`${bTeams.SF1.l.gi}-${bTeams.SF1.l.tid}`,12);
  if(bTeams.SF2.l) upd(`${bTeams.SF2.l.gi}-${bTeams.SF2.l.tid}`,12);
  if(bTeams.SF1.w) upd(`${bTeams.SF1.w.gi}-${bTeams.SF1.w.tid}`,20);
  if(bTeams.SF2.w) upd(`${bTeams.SF2.w.gi}-${bTeams.SF2.w.tid}`,20);

  // Grand Final
  bTeams.GF=pick('GF',bTeams.SF1.w,bTeams.SF2.w);
  if(bTeams.GF.l) upd(`${bTeams.GF.l.gi}-${bTeams.GF.l.tid}`,20);
  if(bTeams.GF.w) upd(`${bTeams.GF.w.gi}-${bTeams.GF.w.tid}`,32);

  return floor;
}

function getBracketTeams(){
  const groups=data.groups.map(g=>{
    const certainty=g.teams.map(t=>({id:t.id,counts:[0,0,0,0]}));
    for(let i=0;i<5000;i++){
      const simM=g.matches.map(m=>{
        if(m.done&&(m.s1===3||m.s2===3)) return m;
        let c1=0,c2=0;while(c1<3&&c2<3) Math.random()>.5?c1++:c2++;
        return{...m,s1:c1,s2:c2,...simGoals(c1,c2),done:true};
      });
      const res=getSortedStandings(g.teams,simM);
      for(let idx=0;idx<4;idx++) certainty.find(x=>x.id===res[idx].id).counts[idx]++;
    }
    const sorted=getSortedStandings(g.teams,g.matches);
    const getSecure=pos=>{const t=sorted[pos];const s=certainty.find(x=>x.id===t.id);return s.counts[pos]===5000?t:null;};
    return{getSecure};
  });
  const m={
    UBQF1:[groups[0].getSecure(0),groups[3].getSecure(0)],UBQF2:[groups[1].getSecure(0),groups[2].getSecure(0)],
    LBR1_1:[groups[2].getSecure(1),groups[3].getSecure(2)],LBR1_2:[groups[1].getSecure(1),groups[0].getSecure(2)],
    LBR1_3:[groups[3].getSecure(1),groups[2].getSecure(2)],LBR1_4:[groups[0].getSecure(1),groups[1].getSecure(2)],
  };
  const getW=id=>data.bracket[id]?m[id][data.bracket[id]-1]:null;
  const getL=id=>data.bracket[id]?m[id][data.bracket[id]===1?1:0]:null;
  m.LBR2_1=[getW('LBR1_1'),getW('LBR1_2')];m.LBR2_2=[getW('LBR1_3'),getW('LBR1_4')];
  m.LBQF1=[getL('UBQF1'),getW('LBR2_1')];m.LBQF2=[getL('UBQF2'),getW('LBR2_2')];
  m.SF1=[getW('UBQF2'),getW('LBQF1')];m.SF2=[getW('UBQF1'),getW('LBQF2')];
  m.GF=[getW('SF1'),getW('SF2')];
  return m;
}

// ── Simulation ────────────────────────────────────────────────────────────────
function simTournamentOnce(){
  const pts={};
  const st=data.groups.map((g,gi)=>{
    const sm=g.matches.map(m=>{
      if(m.done&&(m.s1===3||m.s2===3)) return m;
      let a=0,b=0;while(a<3&&b<3) Math.random()>.5?a++:b++;
      return{...m,s1:a,s2:b,...simGoals(a,b),done:true};
    });
    return getSortedStandings(g.teams,sm).map(t=>({...t,gi}));
  });
  st.forEach((s,gi)=>pts[`${gi}-${s[3].id}`]=4);
  const pl=(id,t1,t2)=>{if(!t1||!t2)return[t1,t2];const r=data.bracket[id];if(r)return r===1?[t1,t2]:[t2,t1];return Math.random()>.5?[t1,t2]:[t2,t1];};
  const[u1w,u1l]=pl('UBQF1',st[0][0],st[3][0]);
  const[u2w,u2l]=pl('UBQF2',st[1][0],st[2][0]);
  const[r1w,r1l]=pl('LBR1_1',st[2][1],st[3][2]);
  const[r2w,r2l]=pl('LBR1_2',st[1][1],st[0][2]);
  const[r3w,r3l]=pl('LBR1_3',st[3][1],st[2][2]);
  const[r4w,r4l]=pl('LBR1_4',st[0][1],st[1][2]);
  [r1l,r2l,r3l,r4l].forEach(t=>{if(t)pts[`${t.gi}-${t.id}`]=6;});
  const[l21w,l21l]=pl('LBR2_1',r1w,r2w);
  const[l22w,l22l]=pl('LBR2_2',r3w,r4w);
  [l21l,l22l].forEach(t=>{if(t)pts[`${t.gi}-${t.id}`]=8;});
  const[q1w,q1l]=pl('LBQF1',u1l,l21w);
  const[q2w,q2l]=pl('LBQF2',u2l,l22w);
  [q1l,q2l].forEach(t=>{if(t)pts[`${t.gi}-${t.id}`]=12;});
  const[s1w,s1l]=pl('SF1',u2w,q1w);
  const[s2w,s2l]=pl('SF2',u1w,q2w);
  [s1l,s2l].forEach(t=>{if(t)pts[`${t.gi}-${t.id}`]=16;});
  const[gw,gl]=pl('GF',s1w,s2w);
  if(gw)pts[`${gw.gi}-${gw.id}`]=36;
  if(gl)pts[`${gl.gi}-${gl.id}`]=24;
  return pts;
}
function calcLCQ(teamPts){
  const m2={};
  Object.keys(REGIONS).forEach(r=>m2[r]={total:0,best:0});
  data.groups.forEach((g,gi)=>{
    g.teams.forEach(t=>{
      const p=teamPts[`${gi}-${t.id}`]||0;
      const r=GR[gi][t.id];
      m2[r].total+=p;if(p>m2[r].best)m2[r].best=p;
    });
  });
  return Object.keys(REGIONS).map(r=>{
    const d=M1[r];
    const score=(d.total/d.teams)+(m2[r].total/d.teams);
    return{r,score,best:d.best+m2[r].best,m1avg:d.total/d.teams,m2avg:m2[r].total/d.teams};
  }).sort((a,b)=>Math.abs(b.score-a.score)>0.0001?b.score-a.score:b.best-a.best);
}
function runAllSims(n=100000){
  const lcqCnt={};Object.keys(REGIONS).forEach(r=>lcqCnt[r]=0);
  const regCounts={},tieCounts={},oceSpecial={Wildcard:{direct:0,tie:0},PWR:{direct:0,tie:0,elim:0}};
  Object.keys(REGIONAL_TEAMS).forEach(region=>{
    regCounts[region]={};tieCounts[region]={};
    REGIONAL_TEAMS[region].forEach(t=>{regCounts[region][t.name]=new Array(REGIONAL_TEAMS[region].length).fill(0);});
  });
  for(let i=0;i<n;i++){
    const pts=simTournamentOnce();
    calcLCQ(pts).slice(0,4).forEach(x=>lcqCnt[x.r]++);
    Object.keys(REGIONAL_TEAMS).forEach(region=>{
      const cut=WORLDS_SPOTS[region];
      const teams=REGIONAL_TEAMS[region].map(t=>{
        const majorPts=t.gi>=0?(pts[`${t.gi}-${t.tid}`]||4):0;
        return{name:t.name,total:t.base+(t.gi>=0?majorPts-4:0),majorPts};
      });
      const sorted=[...teams].sort((a,b)=>b.total!==a.total?b.total-a.total:b.majorPts!==a.majorPts?b.majorPts-a.majorPts:0);
      if(cut<sorted.length){
        const ab=sorted[cut-1],bl=sorted[cut];
        if(ab.total===bl.total){
          const key=[ab.name,bl.name].sort().join('|');
          tieCounts[region][key]=(tieCounts[region][key]||0)+1;
          if(!tieCounts[region+'_t'])tieCounts[region+'_t']={};
          tieCounts[region+'_t'][ab.name]=(tieCounts[region+'_t'][ab.name]||0)+1;
          tieCounts[region+'_t'][bl.name]=(tieCounts[region+'_t'][bl.name]||0)+1;
        }
      }
      teams.sort((a,b)=>b.total!==a.total?b.total-a.total:b.majorPts!==a.majorPts?b.majorPts-a.majorPts:Math.random()>.5?1:-1);
      teams.forEach((team,idx)=>regCounts[region][team.name][idx]++);
      if(region==='OCE'){
        const wc=REGIONAL_TEAMS.OCE.find(t=>t.name==='Wildcard');
        const wcPts=wc.gi>=0?(pts[`${wc.gi}-${wc.tid}`]||4):4;
        if(wcPts>4){oceSpecial.Wildcard.direct++;oceSpecial.PWR.elim++;}
        else{oceSpecial.Wildcard.tie++;oceSpecial.PWR.tie++;}
      }
    });
  }
  return{lcq:Object.keys(REGIONS).map(r=>({r,prob:lcqCnt[r]/n})).sort((a,b)=>b.prob-a.prob),regional:regCounts,ties:tieCounts,oceSpecial,n};
}

function renderLCQ(results){
  const{lcq:sim,n:N}=results;
  const floor=getConfirmedTeamFloor();

  const conf={};Object.keys(REGIONS).forEach(r=>conf[r]={total:0});
  data.groups.forEach((g,gi)=>g.teams.forEach(t=>{
    conf[GR[gi][t.id]].total+=(4+floor[`${gi}-${t.id}`]);
  }));
  const rows=sim.map(s=>{
    const r=s.r,m1d=M1[r];
    const m1avg=m1d.total/m1d.teams,m2avg=conf[r].total/m1d.teams;
    return{r,prob:s.prob,score:m1avg+m2avg,m1avg,m2avg};
  }).sort((a,b)=>Math.abs(b.score-a.score)>0.001?b.score-a.score:b.prob-a.prob);
  let html=`<div style="padding:0">
  <p style="color:#444;font-size:.65em;margin:0 0 12px;letter-spacing:1px">▸ TOP 4 REGIONS QUALIFY FOR LCQ — WORLD CHAMPIONSHIP &nbsp;|&nbsp; ${N.toLocaleString()} SIMULATIONS</p>

  </tr></thead><tbody>`;
  rows.forEach((s,i)=>{

    if(i===4) html+=`<tr class="lcq-divider"><td colspan="5"></td></tr>`;
    const probPct=isSecured?'100%':isElim?'0%':prob>=0.999?'99.9%':`${(prob*100).toFixed(1)}%`;
    const probColor=isSecured?'#00ff88':isElim?'#333':prob>=.7?'#4caf50':prob>=.4?'#f9a825':'#e57373';
    html+=`<tr style="${isSecured?'background:rgba(0,220,100,0.1)':''}">
      <td class="lcq-region-name"><span class="lcq-dot" style="background:${ri.color}"></span>${ri.name}</td>
      <td style="font-weight:bold;color:${isTop4?'#fff':'#888'}">${s.score.toFixed(2)}</td>
      <td style="color:#666">${s.m1avg.toFixed(2)}</td>
      <td style="color:${isTop4?'#ccc':'#555'}">${s.m2avg.toFixed(2)}</td>
      <td><div class="lcq-prob-bar">
        <div class="lcq-bar-bg"><div class="lcq-bar-fill" style="width:${Math.round(prob*100)}%;background:${probColor}"></div></div>
        <span style="color:${probColor};font-weight:bold;min-width:52px;font-size:.95em">${isSecured?'✓ 100%':probPct}</span>
      </div></td>
    </tr>`;
  });
  html+=`</tbody></table>
  <p class="lcq-note">* SCORE = AVG PTS/TEAM PER MAJOR, SUMMED | AVG M2 = CONFIRMED RESULTS ONLY | TIEBREAKER: BEST RESULT M1 + BEST RESULT M2</p>
  </div>`;
  document.getElementById('lcq-container').innerHTML=html;
}

function getStandings(teams,matches){

  const rg=grp=>{if(grp.length<=1)return grp;const rv=t=>grp.filter(x=>x.id!==t.id);return[...grp].sort((a,b)=>{const ha=h2h(a.id,rv(a)),hb=h2h(b.id,rv(b));if(hb.sW!==ha.sW)return hb.sW-ha.sW;if(hb.gDiff!==ha.gDiff)return hb.gDiff-ha.gDiff;const oa=overall(a.id),ob=overall(b.id);if(ob.gDiff!==oa.gDiff)return ob.gDiff-oa.gDiff;if(hb.glDiff!==ha.glDiff)return hb.glDiff-ha.glDiff;if(ob.glDiff!==oa.glDiff)return ob.glDiff-oa.glDiff;return a.seed-b.seed;});};
  const ws=teams.map(t=>({...t,ov:overall(t.id)}));ws.sort((a,b)=>b.ov.sW-a.ov.sW);

function runAllSims_W(groups,bracket,n=100000){
  const lcqCnt={};REG_KEYS.forEach(r=>lcqCnt[r]=0);
  const regCounts={},tieCounts={},oceSpecial={Wildcard:{direct:0,tie:0},PWR:{direct:0,tie:0,elim:0}};
  Object.keys(REGIONAL_TEAMS_W).forEach(region=>{regCounts[region]={};tieCounts[region]={};REGIONAL_TEAMS_W[region].forEach(t=>{regCounts[region][t.name]=new Array(REGIONAL_TEAMS_W[region].length).fill(0);});});
  for(let i=0;i<n;i++){
    const pts=simTourney(groups,bracket);
    calcLCQ_W(pts).slice(0,4).forEach(x=>lcqCnt[x.r]++);
    Object.keys(REGIONAL_TEAMS_W).forEach(region=>{
      const cut=WORLDS_SPOTS_W[region];
      const teams=REGIONAL_TEAMS_W[region].map(t=>{const majorPts=t.gi>=0?(pts[t.gi+'-'+t.tid]||4):0;return{name:t.name,total:t.base+(t.gi>=0?majorPts-4:0),majorPts};});
      const sorted=[...teams].sort((a,b)=>b.total!==a.total?b.total-a.total:b.majorPts!==a.majorPts?b.majorPts-a.majorPts:0);
      if(cut<sorted.length){const ab=sorted[cut-1],bl=sorted[cut];if(ab.total===bl.total){const key=[ab.name,bl.name].sort().join('|');tieCounts[region][key]=(tieCounts[region][key]||0)+1;if(!tieCounts[region+'_t'])tieCounts[region+'_t']={};tieCounts[region+'_t'][ab.name]=(tieCounts[region+'_t'][ab.name]||0)+1;tieCounts[region+'_t'][bl.name]=(tieCounts[region+'_t'][bl.name]||0)+1;}}
      teams.sort((a,b)=>b.total!==a.total?b.total-a.total:b.majorPts!==a.majorPts?b.majorPts-a.majorPts:Math.random()>.5?1:-1);
      teams.forEach((team,idx)=>regCounts[region][team.name][idx]++);
      if(region==='OCE'){const wc=REGIONAL_TEAMS_W.OCE.find(t=>t.name==='Wildcard');const wcPts=wc.gi>=0?(pts[wc.gi+'-'+wc.tid]||4):4;if(wcPts>4){oceSpecial.Wildcard.direct++;oceSpecial.PWR.elim++;}else{oceSpecial.Wildcard.tie++;oceSpecial.PWR.tie++;}}
    });
  }
  return{lcq:REG_KEYS.map(r=>({r,prob:lcqCnt[r]/n})).sort((a,b)=>b.prob-a.prob),regional:regCounts,ties:tieCounts,oceSpecial,n};
}

// ── Notification system ───────────────────────────────────────────────────────
const _prevState={lcq:{},regional:{}};

function showNotif(icon,title,body,green=false){
  document.getElementById('notif-icon').textContent=icon;
  document.getElementById('notif-title').textContent=title;
  document.getElementById('notif-body').innerHTML=body;
  const box=document.getElementById('notif-box');
  green?box.classList.add('notif-green'):box.classList.remove('notif-green');
  document.getElementById('notif-overlay').classList.add('show');
}
function closeNotif(){
  document.getElementById('notif-overlay').classList.remove('show');
}

// Teams to watch for worlds qualification (not guaranteed by region ranking)
const WATCH_WORLDS=[
  {name:'Wildcard',  region:'OCE', logo:'wildcard.png'},
  {name:'Team Falcons',region:'MENA',logo:'falcons.png'},
  {name:'R8 Esports', region:'MENA',logo:'r8.png'},
  {name:'Virtus Pro',  region:'NA', logo:'vp.png'},
  {name:'FUT Esports', region:'NA', logo:'fut.png'},
];

function checkNotifications(results){
  const{lcq,regional,oceSpecial,n}=results;
  const msgs=[];

  // LCQ regions secured
  lcq.forEach(s=>{
    const secured=s.prob>=0.99999;
    if(secured&&!_prevState.lcq[s.r]){
      _prevState.lcq[s.r]=true;
      msgs.push({
        icon:'🌏',
        title:`${REGIONS[s.r].name.toUpperCase()} — LCQ SECURED`,
        body:`<b>${REGIONS[s.r].name}</b> has mathematically secured a spot at the<br><b>Last Chance Qualifier</b> for the World Championship.`,
        green:true
      });
    }
  });

  // Watched teams worlds qualification
  WATCH_WORLDS.forEach(tw=>{
    const region=tw.region;
    const cut=WORLDS_SPOTS[region];
    const counts=regional[region];
    if(!counts||!counts[tw.name]) return;
    const qualProb=counts[tw.name].slice(0,cut).reduce((a,b)=>a+b,0)/n;
    const secured=qualProb>=0.99999;
    if(!_prevState.regional[tw.name]) _prevState.regional[tw.name]=false;
    if(secured&&!_prevState.regional[tw.name]){
      _prevState.regional[tw.name]=true;
      msgs.push({
        icon:'🏆',
        title:`${tw.name.toUpperCase()} — WORLDS QUALIFIED`,
        body:`<b>${tw.name}</b> has mathematically secured their spot at the<br><b>RLCS World Championship</b>!`,
        green:true
      });
    }
  });

  // OCE special: Wildcard direct
  if(oceSpecial.Wildcard.direct/n>=0.99999&&!_prevState.regional['Wildcard_direct']){
    _prevState.regional['Wildcard_direct']=true;
    msgs.push({
      icon:'🏆',
      title:'WILDCARD — WORLDS QUALIFIED DIRECT',
      body:'<b>Wildcard</b> has secured direct qualification to the<br><b>RLCS World Championship</b>!',
      green:true
    });
  }

  // Show first message (queue if multiple)
  if(msgs.length>0) showNotif(msgs[0].icon,msgs[0].title,msgs[0].body,msgs[0].green);
}

function render(){
  const container=document.getElementById('groups-container');
  container.innerHTML='';
  data.groups.forEach(g=>{
    const simR=(()=>{
      let r=g.teams.map(t=>({id:t.id,counts:[0,0,0,0]}));
      for(let i=0;i<30000;i++){
        const sm=g.matches.map(m=>{
          if(m.done&&(m.s1===3||m.s2===3)) return m;
          let c1=0,c2=0;while(c1<3&&c2<3) Math.random()>.5?c1++:c2++;
          return{...m,s1:c1,s2:c2,...simGoals(c1,c2),done:true};
        });
        const res=getSortedStandings(g.teams,sm);
        for(let idx=0;idx<4;idx++) r.find(x=>x.id===res[idx].id).counts[idx]++;
      }
      return r;
    })();
    const card=document.createElement('div');
    card.className='group-card';
    const elig=checkMatrixEligibility(g);
    let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0;font-size:1em;letter-spacing:2px">${g.name}</h2>
      <button class="btn-group-reset" onclick="resetGroupMatches(${g.id})">↺ RESET MATCHES</button>
    </div>`;
    html+=`<button class="matrix-btn ${elig?'active':''}" onclick="openMatrix(${g.id})">GENERATE FINAL MATRIX</button>`;
    html+=`<table><thead><tr>
      <th style="text-align:left">TEAM</th><th>W-L</th><th>GAMES</th>
      <th class="th-ub">1ST</th><th class="th-lb">2ND</th><th class="th-lb">3RD</th><th class="th-out">4TH</th>
    </tr></thead><tbody>`;
    getSortedStandings(g.teams,g.matches).forEach(team=>{
      const s=simR.find(x=>x.id===team.id);
      let sW=0,sL=0,gW=0,gL=0;
      g.matches.forEach(m=>{
        if(m.done&&(m.s1===3||m.s2===3)){
          if(m.t1===team.id){sW+=(m.s1>m.s2?1:0);sL+=(m.s1<m.s2?1:0);gW+=m.s1;gL+=m.s2;}
          else if(m.t2===team.id){sW+=(m.s2>m.s1?1:0);sL+=(m.s2<m.s1?1:0);gW+=m.s2;gL+=m.s1;}
        }
      });
      const tLogo=LOGOS[team.name];
      html+=`<tr>
        <td style="text-align:left;display:flex;align-items:center;gap:6px">
          ${tLogo?`<img src="logos/${tLogo}" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display='none'">`:
            `<input type="color" class="color-picker" value="${team.color}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).color=this.value;save()">`}
          <input class="input-name" value="${team.name}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).name=this.value;save()">
        </td>
        <td>${sW}-${sL}</td><td>${gW}-${gL}</td>
        ${simR.find(x=>x.id===team.id).counts.map((c,ci)=>{
          const p=c/30000;
          const bl=ci===0?'border-left:2px solid #f9a825':ci===1||ci===2?'border-left:2px solid #5b8dd9':'border-left:2px solid #e24444';
          return`<td class="prob-cell" style="background:rgba(226,68,68,${p});color:${p>.4?'#fff':'#666'};${bl}">${p>0&&p<0.001?'<0.1':(p*100).toFixed(1)}%</td>`;
        }).join('')}
      </tr>`;
    });
    html+=`</tbody></table><div class="match-list" id="list-${g.id}">`;
    g.matches.forEach((m,mi)=>{
      const t1=g.teams.find(t=>t.id===m.t1),t2=g.teams.find(t=>t.id===m.t2);
      const l1=LOGOS[t1.name],l2=LOGOS[t2.name];
      const teamIcon=(t,lf)=>lf?`<img src="logos/${lf}" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;margin-right:4px" onerror="this.style.display='none'">${t.name}`:t.name;
      html+=`<div class="match-item ${m.done?'is-done':''}" draggable="true"
        ondragstart="drag(${g.id},${mi})"
        ondragover="allowDrop(event,this)"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="drop(event,${g.id},${mi},this)">
        <div class="match-main">
          <span style="text-align:right;font-weight:bold">${teamIcon(t1,l1)}</span>
          <div class="score-box">
            <input type="number" min="0" max="3" value="${m.s1??''}" placeholder="-" onchange="upd(${g.id},${mi},'s1',this.value)">
            <input type="number" min="0" max="3" value="${m.s2??''}" placeholder="-" onchange="upd(${g.id},${mi},'s2',this.value)">
          </div>
          <span style="text-align:left;font-weight:bold">${teamIcon(t2,l2)}</span>
        </div>
        <div class="goals-container">
          <span style="font-size:.6em;color:#444">GOALS:</span>
          <input type="number" value="${m.g1}" onchange="upd(${g.id},${mi},'g1',this.value)">
          <span style="color:#444">-</span>
          <input type="number" value="${m.g2}" onchange="upd(${g.id},${mi},'g2',this.value)">
        </div>
        <label class="done-check ${m.done?'checked':''}">
          MATCH FINISHED
          <input type="checkbox" ${m.done?'checked':''} onchange="setDone(${g.id},${mi},this.checked)">
        </label>
      </div>`;
    });
    card.innerHTML=html+'</div>';
    container.appendChild(card);
  });
  renderBracket();
  document.getElementById('regional-container').innerHTML='<div class="lcq-loading" style="grid-column:1/-1">⏳ RUNNING SIMULATIONS...</div>';
  document.getElementById('lcq-container').innerHTML='<div class="lcq-loading">⏳ RUNNING SIMULATIONS...</div>';
  setTimeout(()=>{
    const R=runAllSims(100000);
    renderRegionalStandings(R);
    renderLCQ(R);
  },50);
}

let draggedMatch=null;
function drag(gi,mi){draggedMatch={gi,mi};}
function allowDrop(e,el){e.preventDefault();el.classList.add('drag-over');}
function drop(e,gi,mi,el){
  e.preventDefault();el.classList.remove('drag-over');
  if(!draggedMatch||draggedMatch.gi!==gi) return;
  const list=data.groups[gi].matches;
  const item=list.splice(draggedMatch.mi,1)[0];
  list.splice(mi,0,item);
  draggedMatch=null;save();
}
function upd(gi,mi,f,v){data.groups[gi].matches[mi][f]=v===''?null:parseInt(v);save();}
function setDone(gi,mi,v){data.groups[gi].matches[mi].done=v;save();}
function save(){localStorage.setItem('rlcs_paris_v7',JSON.stringify(data));render();}

render();
