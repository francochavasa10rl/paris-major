<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLCS PARIS | ANALYZER PRO MATRIX</title>
    <style>
        @font-face { font-family: 'Bourgeois'; src: url('fonts/Bourgeois-Bold.ttf') format('truetype'); font-weight: bold; }
        :root { --bg: #050505; --card-bg: #0f0f0f; --accent: #e24444; --text: #fff; --border: #333; }
        * { box-sizing: border-box; font-family: 'Bourgeois', sans-serif; text-transform: uppercase; }

        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* DASHBOARD PRINCIPAL */
        .groups-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .group-card { background: var(--card-bg); border: 1px solid var(--border); padding: 15px; }
        h2 { margin-top: 0; color: var(--accent); }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
        th { background: #000; color: #777; font-size: 0.7em; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid var(--border); text-align: center; color: #fff !important; }

        .prob-cell { font-size: 0.9em; font-weight: bold; border: 1px solid #222; }

        /* MATRIZ DE CAPTURA - ESTILO EXCEL PRO */
        .matrix-window { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 1000; padding: 10px;
        }
        .close-matrix { position: absolute; top: 10px; right: 20px; background: var(--accent); color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; z-index: 1010; }

        .matrix-wrapper { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 15px; 
            height: calc(100vh - 40px);
            width: 100%;
        }

        .matrix-section { 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #222; 
            background: #080808;
            padding: 5px;
        }

        .matrix-header-info {
            background: var(--accent);
            color: #000;
            font-size: 0.9em;
            padding: 4px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .matrix-grid { 
            display: grid; 
            grid-template-columns: 60px repeat(6, 1fr); /* Columna para M1 */
            grid-template-rows: 40px repeat(6, 1fr);    /* Fila para M2 */
            flex-grow: 1;
            gap: 2px;
            background: #222;
        }

        .matrix-cell { 
            background: #0f0f0f; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            font-weight: bold;
            text-align: center;
        }

        /* Estilos de encabezados dentro de la matriz */
        .label-cell { background: #1a1a1a; color: #888; font-size: 0.6em; }
        .m2-header { background: #151515; color: var(--accent); font-size: 0.75em; border-bottom: 2px solid var(--accent); }
        .m1-header { background: #151515; color: var(--accent); font-size: 0.75em; border-right: 2px solid var(--accent); }

        .team-box { font-size: 0.95em; padding: 2px; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

        /* INPUTS DASHBOARD */
        .match-item { background: #121212; padding: 10px; border: 1px solid #222; margin-bottom: 5px; text-align: center; }
        .score-box input { background: #000; border: 1px solid #444; color: white; width: 40px; height: 40px; text-align: center; font-size: 1.4em; font-weight: bold; }
        .goals-container { margin-top: 8px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid #222; padding-top: 5px; }
        .goals-container input { width: 50px; background: #050505; border: 1px solid #333; color: var(--accent); text-align: center; font-weight: bold; }

    </style>
</head>
<body>

    <div class="header"><h1>RLCS PARIS | ANALYZER</h1></div>
    <div id="groups-container" class="groups-grid"></div>

    <div id="matrix-window" class="matrix-window">
        <button class="close-matrix" onclick="closeMatrix()">CERRAR [X]</button>
        <div id="matrix-content" class="matrix-wrapper"></div>
    </div>

<script>
const ITERATIONS = 50000;
const SCORES = [[3,0],[3,1],[3,2],[2,3],[1,3],[0,3]];
const DEFAULT_COLORS = ['#e24444', '#fff200', '#00f2ff', '#00ff41'];

let data = JSON.parse(localStorage.getItem('rlcs_final_v3')) || {
    groups: Array.from({length: 4}, (_, i) => ({
        id: i, name: `GRUPO ${String.fromCharCode(65 + i)}`,
        teams: Array.from({length: 4}, (_, j) => ({ id: j, name: `TEAM ${j+1}`, seed: j + 1, color: DEFAULT_COLORS[j] })),
        matches: [
            {t1: 0, t2: 3, s1: null, s2: null, g1: 0, g2: 0}, {t1: 1, t2: 2, s1: null, s2: null, g1: 0, g2: 0},
            {t1: 0, t2: 2, s1: null, s2: null, g1: 0, g2: 0}, {t1: 1, t2: 3, s1: null, s2: null, g1: 0, g2: 0},
            {t1: 0, t2: 1, s1: null, s2: null, g1: 0, g2: 0}, {t1: 2, t2: 3, s1: null, s2: null, g1: 0, g2: 0}
        ]
    }))
};

function getContrastColor(hex) {
    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    return ((r * 299 + g * 587 + b * 114) / 1000) > 128 ? '#000000' : '#ffffff';
}

function getSortedStandings(teams, matches) {
    return [...teams].sort((a, b) => {
        const stats = (id) => {
            let sW = 0, gW = 0, gL = 0, glF = 0, glA = 0;
            matches.forEach(m => {
                if (m.s1 === 3 || m.s2 === 3) {
                    if (m.t1 === id) { sW += (m.s1>m.s2?1:0); gW += m.s1; gL += m.s2; glF += m.g1; glA += m.g2; }
                    else if (m.t2 === id) { sW += (m.s2>m.s1?1:0); gW += m.s2; gL += m.s1; glF += m.g2; glA += m.g1; }
                }
            });
            return { sW, diff: gW - gL, glD: glF - glA };
        };
        const aS = stats(a.id), bS = stats(b.id);
        if (bS.sW !== aS.sW) return bS.sW - aS.sW;
        
        // Desempate simplificado para velocidad de simulación
        if (bS.diff !== aS.diff) return bS.diff - aS.diff;
        if (bS.glD !== aS.glD) return bS.glD - aS.glD;
        return a.seed - b.seed;
    });
}

function openMatrix(groupId) {
    const g = data.groups[groupId];
    const pend = g.matches.filter(m => m.s1 === null || (m.s1 < 3 && m.s2 < 3));
    if (pend.length !== 2) return;
    
    document.getElementById('matrix-window').style.display = 'block';
    const content = document.getElementById('matrix-content');
    
    const m1 = pend[0], m2 = pend[1];
    const t1a = g.teams.find(t=>t.id===m1.t1).name, t1b = g.teams.find(t=>t.id===m1.t2).name;
    const t2a = g.teams.find(t=>t.id===m2.t1).name, t2b = g.teams.find(t=>t.id===m2.t2).name;

    let html = "";
    for (let pos = 0; pos < 4; pos++) {
        html += `<div class="matrix-section">
            <div class="matrix-header-info">
                <span>${pos + 1}º PUESTO</span>
                <span>M1: ${t1a}/${t1b} | M2: ${t2a}/${t2b}</span>
            </div>
            <div class="matrix-grid">
                <div class="matrix-cell label-cell">M1\\M2</div>`;
        
        // Fila superior (Resultados M2)
        SCORES.forEach(s => html += `<div class="matrix-cell m2-header">${s[0]}-${s[1]}</div>`);
        
        SCORES.forEach(s1 => {
            // Columna izquierda (Resultados M1)
            html += `<div class="matrix-cell m1-header">${s1[0]}-${s1[1]}</div>`;
            
            SCORES.forEach(s2 => {
                const sim = g.matches.map(m => {
                    if (m === m1) return {...m, s1: s1[0], s2: s1[1]};
                    if (m === m2) return {...m, s1: s2[0], s2: s2[1]};
                    return m;
                });
                const team = getSortedStandings(g.teams, sim)[pos];
                html += `<div class="matrix-cell" style="background: ${team.color}">
                            <div class="team-box" style="color: ${getContrastColor(team.color)}">${team.name}</div>
                         </div>`;
            });
        });
        html += `</div></div>`;
    }
    content.innerHTML = html;
}

function closeMatrix() { document.getElementById('matrix-window').style.display = 'none'; }

function render() {
    const container = document.getElementById('groups-container');
    container.innerHTML = '';
    data.groups.forEach(g => {
        const simResults = (function() {
            let r = g.teams.map(t => ({ id: t.id, counts: [0,0,0,0] }));
            for(let i=0; i<ITERATIONS; i++) {
                const simM = g.matches.map(m => {
                    if (m.s1 === 3 || m.s2 === 3) return m;
                    let c1 = 0, c2 = 0;
                    while (c1 < 3 && c2 < 3) { Math.random() > 0.5 ? c1++ : c2++; }
                    return {...m, s1: c1, s2: c2, g1: 0, g2: 0};
                });
                const res = getSortedStandings(g.teams, simM);
                for(let idx=0; idx<4; idx++) r.find(x => x.id === res[idx].id).counts[idx]++;
            }
            return r;
        })();

        const curTable = getSortedStandings(g.teams, g.matches);
        const pCount = g.matches.filter(m => m.s1 === null || (m.s1 < 3 && m.s2 < 3)).length;
        const card = document.createElement('div');
        card.className = 'group-card';
        
        let html = `<h2>${g.name}</h2>`;
        html += `<button class="matrix-btn ${pCount === 2 ? 'active' : ''}" onclick="openMatrix(${g.id})">GENERAR MATRIZ DE CAPTURA</button>`;
        html += `<table><thead><tr><th>EQUIPO</th><th>SERIES</th><th>GAMES</th><th>1º</th><th>2º</th><th>3º</th><th>4º</th></tr></thead><tbody>`;
        
        curTable.forEach(team => {
            const s = simResults.find(x => x.id === team.id);
            let sW=0, sL=0, gW=0, gL=0;
            g.matches.forEach(m => { if(m.s1===3||m.s2===3){
                if(m.t1===team.id){sW+=(m.s1>m.s2?1:0); sL+=(m.s1<m.s2?1:0); gW+=m.s1; gL+=m.s2;}
                else if(m.t2===team.id){sW+=(m.s2>m.s1?1:0); sL+=(m.s2<m.s1?1:0); gW+=m.s2; gL+=m.s1;}
            }});
            html += `<tr>
                <td style="text-align:left"><input type="color" class="color-picker" value="${team.color}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).color=this.value; save();">
                    <input class="input-name" value="${team.name}" onchange="data.groups[${g.id}].teams.find(t=>t.id===${team.id}).name=this.value; save();"></td>
                <td>${sW}-${sL}</td><td>${gW}-${gL}</td>
                ${s.counts.map(c => {
                    const p = c/ITERATIONS;
                    return `<td class="prob-cell" style="background:rgba(226,68,68,${p}); color:${p>0.4?'#fff':'#777'}">${(p*100).toFixed(1)}%</td>`;
                }).join('')}
            </tr>`;
        });

        html += `</tbody></table><div class="match-list">`;
        g.matches.forEach((m, mi) => {
            const t1 = g.teams.find(t=>t.id===m.t1);
            const t2 = g.teams.find(t=>t.id===m.t2);
            html += `<div class="match-item">
                <div style="display:grid; grid-template-columns: 1fr 100px 1fr; align-items:center;">
                    <span style="text-align:right; font-weight:bold">${t1.name}</span>
                    <div class="score-box">
                        <input type="number" value="${m.s1??''}" onchange="upd(${g.id},${mi},'s1',this.value)">
                        <input type="number" value="${m.s2??''}" onchange="upd(${g.id},${mi},'s2',this.value)">
                    </div>
                    <span style="text-align:left; font-weight:bold">${t2.name}</span>
                </div>
                <div class="goals-container">
                    <span>GOLES:</span>
                    <input type="number" value="${m.g1}" onchange="upd(${g.id},${mi},'g1',this.value)">
                    <span>-</span>
                    <input type="number" value="${m.g2}" onchange="upd(${g.id},${mi},'g2',this.value)">
                </div>
            </div>`;
        });
        card.innerHTML = html + `</div>`;
        container.appendChild(card);
    });
}

function upd(gi, mi, f, v) { data.groups[gi].matches[mi][f] = v === '' ? null : parseInt(v); save(); }
function save() { localStorage.setItem('rlcs_final_v3', JSON.stringify(data)); render(); }
render();
</script>
</body>
</html>
